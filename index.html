            <p style={{fontSize:13,color:'var(--gray-600)',marginBottom:8}}>{job.conformity.clientName}</p>
            {job.conformity.observations && <p style={{fontSize:13}}>{job.conformity.observations}</p>}
            {job.conformity.signature && <img src={job.conformity.signature} alt="firma" style={{maxWidth:'100%',border:'1px solid var(--gray-200)',borderRadius:6,marginTop:8}}/>}
          </div>
        )}

        {/* Status actions */}
        <div className="divider"/>
        {canEditJob && job.status==='pendiente' && (
          <button className="btn btn-primary btn-full" onClick={()=>changeStatus('en_curso')}>▶ Marcar como En curso (empieza la obra)</button>
        )}
        {canEditJob && job.status==='en_curso' && (
          <button className="btn btn-success btn-full" onClick={()=>changeStatus('completado')}>✓ Marcar como Completado</button>
        )}
        {canEditJob && job.status!=='cancelado' && job.status!=='completado' && (
          <button className="btn btn-secondary btn-full" style={{marginTop:8}} onClick={()=>changeStatus('cancelado')}>✕ Cancelar trabajo</button>
        )}

        {/* Execute button */}
        {canExecute && (job.status==='pendiente'||job.status==='en_curso') && (
          <button className="btn btn-primary btn-full" style={{marginTop:12,fontSize:16,padding:'14px'}}
            onClick={()=>navigate('jobExecution',{jobId})}>
            🛠️ Ir al panel de ejecución paso a paso
          </button>
        )}

        {/* Notify team via WhatsApp */}
        {canEdit(user) && (job.team||[]).length>0 && (
          <button className="btn btn-full" style={{marginTop:8,background:'#25d366',color:'#fff',fontWeight:700}}
            onClick={()=>{
              const appUrl='https://mundom-apps.github.io/mundom-operaciones/';
              const msg=`Hola! Se te asignó el trabajo *${job.title}* para *${job.client}* el día *${job.date}*${job.clientAddress?' en '+job.clientAddress:''}.\n\nIngresá a Mundo M Operaciones para ver los detalles:\n${appUrl}`;
              window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
            }}>
            📲 Notificar equipo por WhatsApp
          </button>
        )}

        {/* Change request button - visible to execution team */}
        {(isMyJob||user.rol===ROLES.jefa) && (job.status==='pendiente'||job.status==='en_curso') && (
          <ChangeRequestButton jobId={jobId} user={user} job={job} showToast={showToast}/>
        )}

        {/* Conformity button */}
        {(canExecute||canEditJob) && job.status==='en_curso' && (
          <button className="btn btn-success btn-full" style={{marginTop:8}}
            onClick={()=>navigate('conformity',{jobId})}>
            ✍️ Registrar conformidad y cierre del cliente
          </button>
        )}

        <div style={{height:20}}/>
      </div>
    </div>
  );
}

// ─── TOP BAR HELPER ───────────────────────────────────────────────────────────
function TopBar({title, onBack, actions}){
  return (
    <div className="top-bar">
      <button onClick={onBack} style={{background:'none',border:'none',color:'#fff',fontSize:22,cursor:'pointer',padding:'0 4px'}}>‹</button>
      <h1 style={{flex:1}}>{title}</h1>
      {actions}
    </div>
  );
}
function LoadingShell({title}){
  return (
    <div className="app-shell">
      <div className="top-bar"><h1>{title}</h1></div>
      <div className="screen" style={{display:'flex',justifyContent:'center',paddingTop:60}}>
        <div className="spinner"/>
      </div>
    </div>
  );
}

// ─── JOB CREATE / EDIT SCREEN ─────────────────────────────────────────────────
function JobCreateScreen({user, editJobId, navigate, goBack, showToast}){
  const [loading,setLoading]=useState(!!editJobId);
  const [saving,setSaving]=useState(false);
  const [allUsers,setAllUsers]=useState({});
  const [templates,setTemplates]=useState({});

  // Form state
  const [title,setTitle]=useState('');
  const [client,setClient]=useState('');
  const [clientPhone,setClientPhone]=useState('');
  const [clientAddress,setClientAddress]=useState('');
  const [date,setDate]=useState(dateKey(Date.now()));
  const [startTime,setStartTime]=useState('08:00');
  const [type,setType]=useState('racks');
  const [team,setTeam]=useState([]);
  const [teamLead,setTeamLead]=useState('');
  const [tasks,setTasks]=useState([]);
  const [materials,setMaterials]=useState([]);
  const [tools,setTools]=useState([]);
  const [safetyEquipment,setSafetyEquipment]=useState([]);
  const [sketchupLink,setSketchupLink]=useState('');
  const [plansNote,setPlansNote]=useState('');
  const [notes,setNotes]=useState('');
  const [clientEmail,setClientEmail]=useState('');
  const [productionDays,setProductionDays]=useState('');
  // Archivos (Google Drive links)
  const [blueprintUrl,setBlueprintUrl]=useState('');
  const [quoteUrl,setQuoteUrl]=useState('');
  const [extraUrl,setExtraUrl]=useState('');
  const [activeSection,setActiveSection]=useState('general');

  // Load users and templates
  useEffect(()=>{
    db.ref('usuarios').once('value').then(s=>setAllUsers(s.val()||{}));
    db.ref('operaciones_templates').once('value').then(s=>{
      const data=s.val()||{};
      setTemplates({...DEFAULT_TEMPLATES,...data});
    });
  },[]);

  // Load existing job for edit
  useEffect(()=>{
    if(!editJobId) return;
    db.ref('operaciones_jobs/'+editJobId).once('value').then(s=>{
      const j=s.val();
      if(!j){ setLoading(false); return; }
      setTitle(j.title||'');
      setClient(j.client||'');
      setClientPhone(j.clientPhone||'');
      setClientAddress(j.clientAddress||'');
      setDate(j.date||dateKey(Date.now()));
      setStartTime(j.startTime||'08:00');
      setType(j.type||'racks');
      setTeam(j.team||[]);
      setTeamLead(j.teamLead||'');
      setTasks(j.tasks||[]);
      setMaterials(j.materials||[]);
      setTools(j.tools||[]);
      setSafetyEquipment(j.safetyEquipment||[]);
      setSketchupLink(j.sketchupLink||'');
      setPlansNote(j.plansNote||'');
      setNotes(j.notes||'');
      setClientEmail(j.clientEmail||'');
      setProductionDays(j.productionDays||'');
      setBlueprintUrl(j.blueprintUrl||'');
      setQuoteUrl(j.quoteUrl||'');
      setExtraUrl(j.extraUrl||'');
      setLoading(false);
    });
  },[editJobId]);

  function applyTemplate(tplKey){
    const tpl=templates[tplKey];
    if(!tpl) return;
    setType(tpl.type);
    setTasks((tpl.tasks||[]).map(t=>({id:uid(),title:t.title,completed:false})));
    setMaterials((tpl.materials||[]).map(m=>({id:uid(),...m,checked:false})));
    setTools((tpl.tools||[]).map(t=>({id:uid(),name:t.name,checked:false})));
    setSafetyEquipment((tpl.safetyEquipment||[]).map(s=>({id:uid(),name:s.name})));
    showToast('Plantilla aplicada: '+tpl.name,'success');
  }

  // Task helpers
  const [newTask,setNewTask]=useState('');
  function addTask(){ if(!newTask.trim()) return; setTasks(t=>[...t,{id:uid(),title:newTask.trim(),completed:false}]); setNewTask(''); }
  function removeTask(id){ setTasks(t=>t.filter(x=>x.id!==id)); }
  function moveTask(id,dir){ setTasks(arr=>{ const i=arr.findIndex(x=>x.id===id); if(i<0) return arr; const a=[...arr]; const j=i+dir; if(j<0||j>=a.length) return a; [a[i],a[j]]=[ a[j],a[i] ]; return a; }); }

  // Material helpers
  const [newMatName,setNewMatName]=useState('');
  const [newMatQty,setNewMatQty]=useState('');
  const [newMatUnit,setNewMatUnit]=useState('u');
  function addMaterial(){ if(!newMatName.trim()) return; setMaterials(m=>[...m,{id:uid(),name:newMatName.trim(),qty:Number(newMatQty)||0,unit:newMatUnit,checked:false}]); setNewMatName(''); setNewMatQty(''); }

  // Tool helpers
  const [newTool,setNewTool]=useState('');
  function addTool(){ if(!newTool.trim()) return; setTools(t=>[...t,{id:uid(),name:newTool.trim(),checked:false}]); setNewTool(''); }

  // Safety helpers
  const [newSafety,setNewSafety]=useState('');
  function addSafety(){ if(!newSafety.trim()) return; setSafetyEquipment(s=>[...s,{id:uid(),name:newSafety.trim()}]); setNewSafety(''); }

  async function save(){
    if(!title.trim()||!client.trim()||!date){
      showToast('Completá título, cliente y fecha','error'); return;
    }
    setSaving(true);
    const jobData={
      title:title.trim(), client:client.trim(), clientPhone:clientPhone.trim(),
      clientEmail:clientEmail.trim(), clientAddress:clientAddress.trim(),
      date, startTime, type, productionDays,
      team, teamLead, tasks, materials, tools, safetyEquipment,
      sketchupLink:sketchupLink.trim(), plansNote:plansNote.trim(), notes:notes.trim(),
      blueprintUrl:blueprintUrl.trim(), quoteUrl:quoteUrl.trim(), extraUrl:extraUrl.trim(),
      status: editJobId ? undefined : 'pendiente',
      updatedAt:Date.now(),
      ...(editJobId ? {} : {createdBy:user.uid, createdAt:Date.now(), status:'pendiente'})
    };
    // Remove undefined keys
    Object.keys(jobData).forEach(k=>jobData[k]===undefined&&delete jobData[k]);
    try{
      if(editJobId){
        await db.ref('operaciones_jobs/'+editJobId).update(jobData);
        showToast('Trabajo actualizado','success');
      } else {
        await db.ref('operaciones_jobs').push(jobData);
        showToast('Trabajo creado','success');
        // WhatsApp notification to team
        if(team.length>0){
          const appUrl='https://mundom-apps.github.io/mundom-operaciones/';
          const msg=`Hola! Se te asignó el trabajo *${title.trim()}* para el cliente *${client.trim()}* en la fecha *${date}*${clientAddress?' — '+clientAddress:''}.\n\nIngresá a la app de Mundo M Operaciones para ver los detalles:\n${appUrl}`;
          const waBase='https://wa.me/?text='+encodeURIComponent(msg);
          window.open(waBase,'_blank');
        }
      }
      goBack();
    } catch(e){
      showToast('Error al guardar','error');
      setSaving(false);
    }
  }

  if(loading) return <LoadingShell title="Cargando..."/>;

  const operarios=Object.entries(allUsers).filter(([,u])=>u.activo).map(([uid,u])=>({uid,...u}));

  const sections=[
    {id:'general',label:'General'},
    {id:'archivos',label:'📎 Archivos'},
    {id:'equipo',label:'Equipo'},
    {id:'tareas',label:'Tareas'},
    {id:'materiales',label:'Materiales'},
    {id:'herramientas',label:'Tools'},
    {id:'seguridad',label:'EPP'},
  ];

  return (
    <div className="app-shell">
      <TopBar title={editJobId?'Editar trabajo':'Nuevo trabajo'} onBack={goBack} actions={
        <button className="btn btn-sm" style={{background:'rgba(255,255,255,.2)',color:'#fff',border:'none'}} onClick={save} disabled={saving}>
          {saving?'...':'💾 Guardar'}
        </button>
      }/>
      <div className="screen">
        {/* Template selector */}
        {!editJobId && (
          <div className="card" style={{marginBottom:16}}>
            <p style={{fontSize:13,fontWeight:700,marginBottom:8}}>📋 Aplicar plantilla</p>
            <div className="chips-row">
              {Object.entries(templates).map(([k,t])=>(
                <div key={k} className="chip" onClick={()=>applyTemplate(k)}>
                  {JOB_TYPE_ICONS[t.type]||'🔨'} {t.name}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Section tabs */}
        <div className="tab-bar" style={{marginBottom:16,overflowX:'auto'}}>
          {sections.map(s=>(
            <button key={s.id} className={`tab-btn${activeSection===s.id?' active':''}`} onClick={()=>setActiveSection(s.id)}>
              {s.label}
            </button>
          ))}
        </div>

        {/* GENERAL */}
        {activeSection==='general' && (
          <div>
            <Field label="Título del trabajo" required>
              <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Ej: Instalación de racks — Depósito Norte"/>
            </Field>
            <Field label="Tipo de trabajo">
              <select value={type} onChange={e=>setType(e.target.value)}>
                {JOB_TYPES.map(t=><option key={t} value={t}>{JOB_TYPE_ICONS[t]} {JOB_TYPE_LABELS[t]}</option>)}
              </select>
            </Field>
            <div className="input-row">
              <Field label="Fecha" required>
                <input type="date" value={date} onChange={e=>setDate(e.target.value)}/>
              </Field>
              <Field label="Hora inicio">
                <input type="time" value={startTime} onChange={e=>setStartTime(e.target.value)}/>
              </Field>
            </div>
            <Field label="Cliente" required>
              <input value={client} onChange={e=>setClient(e.target.value)} placeholder="Nombre del cliente o empresa"/>
            </Field>
            <Field label="Teléfono del cliente">
              <input type="tel" value={clientPhone} onChange={e=>setClientPhone(e.target.value)} placeholder="+598 99 000 000"/>
            </Field>
            <Field label="Email del cliente">
              <input type="email" value={clientEmail} onChange={e=>setClientEmail(e.target.value)} placeholder="cliente@empresa.com"/>
            </Field>
            <Field label="Dirección de la obra">
              <input value={clientAddress} onChange={e=>setClientAddress(e.target.value)} placeholder="Ej: Av. 18 de Julio 1234, Montevideo"/>
              <AddressMapPreview address={clientAddress} autoShow={false}/>
            </Field>
            <Field label="Días de producción estimados">
              <input type="number" value={productionDays} onChange={e=>setProductionDays(e.target.value)} placeholder="Ej: 15"/>
            </Field>
            <Field label="Link SketchUp / Drive (3D)">
              <input type="url" value={sketchupLink} onChange={e=>setSketchupLink(e.target.value)} placeholder="https://..."/>
            </Field>
            <Field label="Nota sobre planos">
              <textarea value={plansNote} onChange={e=>setPlansNote(e.target.value)} placeholder="Referencias, notas de diseño..."/>
            </Field>
            <Field label="Notas generales">
              <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Información adicional para el equipo..."/>
            </Field>
          </div>
        )}

        {/* ARCHIVOS */}
        {activeSection==='archivos' && (
          <div>
            <div className="alert alert-info" style={{marginBottom:16}}>📎 Pegá los links de Google Drive del plano y la cotización. El equipo los puede abrir directamente desde la app.</div>
            <FileLinkField
              label="Plano"
              icon="📐"
              value={blueprintUrl}
              onChange={setBlueprintUrl}
              placeholder="Link de Google Drive al plano..."
            />
            <FileLinkField
              label="Cotización"
              icon="💰"
              value={quoteUrl}
              onChange={setQuoteUrl}
              placeholder="Link de Google Drive a la cotización..."
            />
            <FileLinkField
              label="Archivo adicional (3D, foto de referencia...)"
              icon="📁"
              value={extraUrl}
              onChange={setExtraUrl}
              placeholder="Link de Google Drive u otro servicio..."
            />
          </div>
        )}

        {/* EQUIPO */}
        {activeSection==='equipo' && (
          <div>
            <p style={{fontSize:13,color:'var(--gray-500)',marginBottom:12}}>Seleccioná los miembros del equipo para este trabajo</p>
            {operarios.map(u=>{
              const inTeam=team.includes(u.uid);
              return (
                <div key={u.uid} className={`check-item${inTeam?' checked':''}`}
                  onClick={()=>setTeam(t=>inTeam?t.filter(x=>x!==u.uid):[...t,u.uid])}>
                  <Avatar name={u.nombre} size={32}/>
                  <div style={{flex:1}}>
                    <p style={{fontSize:14,fontWeight:600}}>{u.nombre}</p>
                    <p style={{fontSize:11,color:'var(--gray-500)'}}>{ROLE_LABELS[u.rol]||u.rol}</p>
                  </div>
                  <input type="checkbox" checked={inTeam} onChange={()=>{}} style={{pointerEvents:'none'}}/>
                </div>
              );
            })}
            {team.length > 0 && (
              <div style={{marginTop:16}}>
                <Field label="Líder del equipo">
                  <select value={teamLead} onChange={e=>setTeamLead(e.target.value)}>
                    <option value="">Sin líder asignado</option>
                    {team.map(uid=><option key={uid} value={uid}>{allUsers[uid]?.nombre||uid}</option>)}
                  </select>
                </Field>
              </div>
            )}
          </div>
        )}

        {/* TAREAS */}
        {activeSection==='tareas' && (
          <div>
            {tasks.map((t,i)=>(
              <div key={t.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:'var(--gray-50)',borderRadius:8,marginBottom:6,border:'1px solid var(--gray-200)'}}>
                <span style={{color:'var(--gray-400)',fontSize:13}}>#{i+1}</span>
                <span style={{flex:1,fontSize:13}}>{t.title}</span>
                <button onClick={()=>moveTask(t.id,-1)} style={{background:'none',border:'none',cursor:'pointer',fontSize:14,color:'var(--gray-400)'}}>↑</button>
                <button onClick={()=>moveTask(t.id,1)} style={{background:'none',border:'none',cursor:'pointer',fontSize:14,color:'var(--gray-400)'}}>↓</button>
                <button onClick={()=>removeTask(t.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:'var(--red)'}}>✕</button>
              </div>
            ))}
            <div className="input-row" style={{marginTop:8}}>
              <Field>
                <input value={newTask} onChange={e=>setNewTask(e.target.value)} placeholder="Nueva tarea..."
                  onKeyPress={e=>e.key==='Enter'&&addTask()}/>
              </Field>
              <button className="btn btn-primary" onClick={addTask}>+</button>
            </div>
          </div>
        )}

        {/* MATERIALES */}
        {activeSection==='materiales' && (
          <div>
            {materials.map((m,i)=>(
              <div key={m.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:'var(--gray-50)',borderRadius:8,marginBottom:6,border:'1px solid var(--gray-200)'}}>
                <span style={{flex:1,fontSize:13}}>📦 {m.name}</span>
                {m.qty>0 && <Badge type="badge-gray">{m.qty} {m.unit}</Badge>}
                <button onClick={()=>setMaterials(ms=>ms.filter(x=>x.id!==m.id))} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:'var(--red)'}}>✕</button>
              </div>
            ))}
            <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
              <div className="field" style={{flex:'2',minWidth:120,margin:0}}>
                <input value={newMatName} onChange={e=>setNewMatName(e.target.value)} placeholder="Material..."/>
              </div>
              <div className="field" style={{width:70,margin:0}}>
                <input type="number" value={newMatQty} onChange={e=>setNewMatQty(e.target.value)} placeholder="Qty"/>
              </div>
              <div className="field" style={{width:60,margin:0}}>
                <select value={newMatUnit} onChange={e=>setNewMatUnit(e.target.value)}>
                  {['u','m','m2','kg','bolsa','ml'].map(u=><option key={u} value={u}>{u}</option>)}
                </select>
              </div>
              <button className="btn btn-primary btn-sm" onClick={addMaterial}>+</button>
            </div>
          </div>
        )}

        {/* HERRAMIENTAS */}
        {activeSection==='herramientas' && (
          <div>
            {tools.map(t=>(
              <div key={t.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:'var(--gray-50)',borderRadius:8,marginBottom:6,border:'1px solid var(--gray-200)'}}>
                <span style={{fontSize:16}}>🔧</span>
                <span style={{flex:1,fontSize:13}}>{t.name}</span>
                <button onClick={()=>setTools(ts=>ts.filter(x=>x.id!==t.id))} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:'var(--red)'}}>✕</button>
              </div>
            ))}
            <div className="input-row" style={{marginTop:8}}>
              <Field><input value={newTool} onChange={e=>setNewTool(e.target.value)} placeholder="Nueva herramienta..." onKeyPress={e=>e.key==='Enter'&&addTool()}/></Field>
              <button className="btn btn-primary" onClick={addTool}>+</button>
            </div>
          </div>
        )}

        {/* SEGURIDAD (EPP) */}
        {activeSection==='seguridad' && (
          <div>
            <div className="alert alert-warning">⚠️ Cada operario deberá confirmar el uso de este EPP antes de iniciar</div>
            {safetyEquipment.map(s=>(
              <div key={s.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:'var(--yellow-l)',borderRadius:8,marginBottom:6,border:'1px solid var(--yellow)'}}>
                <span style={{fontSize:16}}>🦺</span>
                <span style={{flex:1,fontSize:13,fontWeight:600}}>{s.name}</span>
                <button onClick={()=>setSafetyEquipment(se=>se.filter(x=>x.id!==s.id))} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:'var(--red)'}}>✕</button>
              </div>
            ))}
            <div className="input-row" style={{marginTop:8}}>
              <Field><input value={newSafety} onChange={e=>setNewSafety(e.target.value)} placeholder="Nuevo EPP..." onKeyPress={e=>e.key==='Enter'&&addSafety()}/></Field>
              <button className="btn btn-primary" onClick={addSafety}>+</button>
            </div>
          </div>
        )}

        <div className="divider"/>
        <button className="btn btn-primary btn-full" onClick={save} disabled={saving} style={{fontSize:16,padding:14}}>
          {saving ? 'Guardando...' : (editJobId ? '💾 Guardar cambios' : '✓ Crear trabajo')}
        </button>
        <div style={{height:20}}/>
      </div>
    </div>
  );
}

// ─── JOB EXECUTION SCREEN ─────────────────────────────────────────────────────
// Steps: 0=Checklist materiales/herr, 1=EPP signoffs, 2=GPS inicio, 3=Tareas+fotos, 4=GPS fin
function JobExecutionScreen({user, jobId, navigate, goBack, showToast}){
  const [job,setJob]=useState(null);
  const [loading,setLoading]=useState(true);
  const [step,setStep]=useState(0);
  const [users,setUsers]=useState({});

  // Step 0 - checklist
  const [materials,setMaterials]=useState([]);
  const [tools,setTools]=useState([]);

  // Step 1 - EPP signoffs per person
  const [signoffs,setSignoffs]=useState({}); // uid -> {equipment:[{...confirmed}], signature}
  const [signoffUid,setSignoffUid]=useState(null); // which person is currently signing

  // Step 2 - GPS start
  const [gpsStart,setGpsStart]=useState(null);

  // Step 3 - tasks + photos
  const [tasks,setTasks]=useState([]);
  const [photos,setPhotos]=useState([]);
  const [taskNotes,setTaskNotes]=useState('');

  // Step 4 - GPS end
  const [gpsEnd,setGpsEnd]=useState(null);

  const STEPS=['Checklist','EPP','Inicio GPS','Tareas','Fin GPS'];

  useEffect(()=>{
    db.ref('operaciones_jobs/'+jobId).once('value').then(s=>{
      const j=s.val();
      if(j){
        const jj={id:jobId,...j};
        setJob(jj);
        setMaterials((j.materials||[]).map(m=>({...m,checked:m.checked||false})));
        setTools((j.tools||[]).map(t=>({...t,checked:t.checked||false})));
        setTasks((j.tasks||[]).map(t=>({...t,completed:t.completed||false})));
        setPhotos(j.photos||[]);
        setGpsStart(j.gpsStart||null);
        setGpsEnd(j.gpsEnd||null);
        // Init signoffs
        const teamUids=j.team||[];
        const initSO={};
        teamUids.forEach(uid=>{
          initSO[uid]={
            equipment:(j.safetyEquipment||[]).map(s=>({...s,confirmed:false})),
            signature:null
          };
        });
        setSignoffs(initSO);
        if(teamUids.length>0) setSignoffUid(teamUids[0]);
      }
      setLoading(false);
    });
    db.ref('usuarios').once('value').then(s=>setUsers(s.val()||{}));
  },[jobId]);

  async function saveAndFinish(){
    const updates={
      tasks, materials, tools, photos,
      gpsStart, gpsEnd,
      startTs: job.startTs || (gpsStart?.ts) || Date.now(),
      endTs: gpsEnd?.ts || Date.now(),
      status:'completado',
      updatedAt:Date.now()
    };
    if(taskNotes) updates.executionNotes=taskNotes;
    await db.ref('operaciones_jobs/'+jobId).update(updates);
    // Save signoffs
    for(const [uid,so] of Object.entries(signoffs)){
      if(so.signature){
        await db.ref('operaciones_signoffs/'+jobId+'/'+uid).set({...so,ts:Date.now()});
      }
    }
    showToast('Trabajo completado','success');
    goBack();
  }

  async function saveProgress(){
    await db.ref('operaciones_jobs/'+jobId).update({
      tasks, materials, tools, photos,
      gpsStart, gpsEnd,
      status:'en_curso',
      startTs: job.startTs || (gpsStart?.ts) || Date.now(),
      updatedAt:Date.now()
    });
    showToast('Progreso guardado','success');
  }

  if(loading) return <LoadingShell title="Cargando..."/>;
  if(!job) return <div className="app-shell"><TopBar title="Error" onBack={goBack}/><div className="screen"><p>No se encontró el trabajo.</p></div></div>;

  const teamUids=job.team||[];

  return (
    <div className="app-shell">
      <TopBar title={`🛠️ ${job.title}`} onBack={goBack} actions={
        <button className="btn btn-sm" style={{background:'rgba(255,255,255,.2)',color:'#fff',border:'none'}} onClick={saveProgress}>
          💾
        </button>
      }/>
      <div className="screen">
        <StepBar steps={STEPS} current={step}/>

        {/* ── STEP 0: CHECKLIST MATERIALES / HERRAMIENTAS ── */}
        {step===0 && (
          <div>
            <div className="alert alert-info">Verificá que tenés todo antes de salir</div>

            {materials.length > 0 && (
              <div className="card">
                <div className="card-title">📦 Materiales</div>
                {materials.map((m,i)=>(
                  <div key={m.id||i} className={`check-item${m.checked?' checked':''}`}
                    onClick={()=>setMaterials(ms=>ms.map((x,j)=>j===i?{...x,checked:!x.checked}:x))}>
                    <input type="checkbox" checked={m.checked} onChange={()=>{}}/>
                    <span>{m.name}{m.qty>0?` — ${m.qty} ${m.unit||'u'}`:''}</span>
                  </div>
                ))}
              </div>
            )}

            {tools.length > 0 && (
              <div className="card">
                <div className="card-title">🔧 Herramientas</div>
                {tools.map((t,i)=>(
                  <div key={t.id||i} className={`check-item${t.checked?' checked':''}`}
                    onClick={()=>setTools(ts=>ts.map((x,j)=>j===i?{...x,checked:!x.checked}:x))}>
                    <input type="checkbox" checked={t.checked} onChange={()=>{}}/>
                    <span>{t.name}</span>
                  </div>
                ))}
              </div>
            )}

            {materials.length===0 && tools.length===0 && (
              <div className="empty-state"><div className="es-icon">✅</div><p>Sin checklist definido</p></div>
            )}

            <button className="btn btn-primary btn-full" style={{marginTop:16}} onClick={()=>setStep(1)}>
              Siguiente → EPP
            </button>
          </div>
        )}

        {/* ── STEP 1: EPP SIGNOFFS ── */}
        {step===1 && (
          <div>
            {(job.safetyEquipment||[]).length===0 ? (
              <div>
                <div className="empty-state"><div className="es-icon">🦺</div><p>Sin EPP requerido para este trabajo</p></div>
                <div style={{display:'flex',gap:10,marginTop:16}}>
                  <button className="btn btn-secondary btn-full" onClick={()=>setStep(0)}>← Atrás</button>
                  <button className="btn btn-primary btn-full" onClick={()=>setStep(2)}>Siguiente →</button>
                </div>
              </div>
            ) : (
              <div>
                <div className="alert alert-warning">Cada operario debe confirmar su EPP y firmar</div>
                {/* Person selector */}
                <div style={{display:'flex',gap:8,marginBottom:16,overflow:'auto'}}>
                  {teamUids.map(uid=>{
                    const so=signoffs[uid]||{};
                    const done=so.signature&&(so.equipment||[]).every(e=>e.confirmed);
                    return (
                      <button key={uid} onClick={()=>setSignoffUid(uid)}
                        className="btn btn-sm" style={{
                          background:signoffUid===uid?'var(--orange)':done?'var(--green)':'var(--gray-200)',
                          color:signoffUid===uid||done?'#fff':'var(--gray-700)',
                          flexShrink:0
                        }}>
                        {done?'✓ ':''}{users[uid]?.nombre?.split(' ')[0]||uid}
                      </button>
                    );
                  })}
                </div>

                {signoffUid && (
                  <div className="card">
                    <p style={{fontWeight:700,fontSize:14,marginBottom:12}}>
                      {users[signoffUid]?.nombre||signoffUid}
                    </p>
                    {/* EPP checklist */}
                    {(signoffs[signoffUid]?.equipment||[]).map((eq,i)=>(
                      <div key={eq.id||i} className={`check-item${eq.confirmed?' checked':''}`}
                        onClick={()=>setSignoffs(prev=>{
                          const so={...prev[signoffUid]};
                          so.equipment=so.equipment.map((x,j)=>j===i?{...x,confirmed:!x.confirmed}:x);
                          return {...prev,[signoffUid]:so};
                        })}>
                        <input type="checkbox" checked={eq.confirmed} onChange={()=>{}}/>
                        <span>🦺 {eq.name}</span>
                      </div>
                    ))}
                    {/* Signature */}
                    <div style={{marginTop:12}}>
                      {signoffs[signoffUid]?.signature ? (
                        <div>
                          <p style={{fontSize:12,color:'var(--green)',fontWeight:700,marginBottom:6}}>✓ Firma registrada</p>
                          <img src={signoffs[signoffUid].signature} alt="firma" style={{maxWidth:'100%',border:'1px solid var(--gray-200)',borderRadius:6}}/>
                          <button className="btn btn-sm btn-secondary" style={{marginTop:6}}
                            onClick={()=>setSignoffs(prev=>({...prev,[signoffUid]:{...prev[signoffUid],signature:null}}))}>
                            Repetir firma
                          </button>
                        </div>
                      ) : (
                        <SignatureCanvas label="Firma del operario" onSave={sig=>setSignoffs(prev=>({...prev,[signoffUid]:{...prev[signoffUid],signature:sig}}))}/>
                      )}
                    </div>
                  </div>
                )}

                <div style={{display:'flex',gap:10,marginTop:16}}>
                  <button className="btn btn-secondary btn-full" onClick={()=>setStep(0)}>← Atrás</button>
                  <button className="btn btn-primary btn-full" onClick={()=>setStep(2)}>Siguiente →</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── STEP 2: GPS START ── */}
        {step===2 && (
          <div>
            <div className="alert alert-info">Capturá la ubicación al llegar a la obra</div>
            <div className="card">
              <div className="card-title">📍 Ubicación de inicio</div>
              <GpsCapture label="Ubicación de inicio" value={gpsStart} onCapture={setGpsStart}/>
            </div>
            <div style={{display:'flex',gap:10,marginTop:16}}>
              <button className="btn btn-secondary btn-full" onClick={()=>setStep(1)}>← Atrás</button>
              <button className="btn btn-primary btn-full" onClick={()=>setStep(3)}>Siguiente →</button>
            </div>
          </div>
        )}

        {/* ── STEP 3: TASKS + PHOTOS ── */}
        {step===3 && (
          <div>
            {tasks.length > 0 && (
              <div className="card">
                <div className="section-head">
                  <div className="card-title" style={{margin:0}}>Tareas</div>
                  <span style={{fontSize:13,color:'var(--gray-500)'}}>
                    {tasks.filter(t=>t.completed).length}/{tasks.length}
                  </span>
                </div>
                <ProgressBar value={tasks.filter(t=>t.completed).length} max={tasks.length}/>
                <div style={{marginTop:10}}>
                  {tasks.map((t,i)=>(
                    <div key={t.id||i} className={`check-item${t.completed?' checked':''}`}
                      onClick={()=>setTasks(ts=>ts.map((x,j)=>j===i?{...x,completed:!x.completed,completedBy:user.uid,completedAt:Date.now()}:x))}>
                      <input type="checkbox" checked={t.completed} onChange={()=>{}}/>
                      <span>{t.title}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div className="card">
              <div className="card-title">📷 Fotos del trabajo</div>
              <PhotoCapture photos={photos} onAdd={p=>setPhotos(ps=>[...ps,p])} onRemove={id=>setPhotos(ps=>ps.filter(p=>p.id!==id))} maxPhotos={12}/>
            </div>

            <div className="card">
              <Field label="Notas de ejecución">
                <textarea value={taskNotes} onChange={e=>setTaskNotes(e.target.value)} placeholder="Observaciones, incidentes, información relevante..."/>
              </Field>
            </div>

            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-secondary btn-full" onClick={()=>setStep(2)}>← Atrás</button>
              <button className="btn btn-primary btn-full" onClick={()=>setStep(4)}>Siguiente →</button>
            </div>
          </div>
        )}

        {/* ── STEP 4: GPS END + FINISH ── */}
        {step===4 && (
          <div>
            <div className="alert alert-success">¡Último paso! Capturá la ubicación final y terminá</div>
            <div className="card">
              <div className="card-title">📍 Ubicación de fin</div>
              <GpsCapture label="Ubicación de fin" value={gpsEnd} onCapture={setGpsEnd}/>
            </div>
            {/* Summary */}
            <div className="card">
              <div className="card-title">Resumen</div>
              <p style={{fontSize:13,marginBottom:4}}>✅ Tareas: {tasks.filter(t=>t.completed).length}/{tasks.length}</p>
              <p style={{fontSize:13,marginBottom:4}}>📷 Fotos: {photos.length}</p>
              <p style={{fontSize:13,marginBottom:4}}>🦺 Firmas EPP: {Object.values(signoffs).filter(s=>s.signature).length}/{teamUids.length}</p>
              <p style={{fontSize:13,marginBottom:4}}>📍 GPS inicio: {gpsStart?'✓':'Sin capturar'}</p>
              <p style={{fontSize:13}}>📍 GPS fin: {gpsEnd?'✓':'Sin capturar'}</p>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-secondary btn-full" onClick={()=>setStep(3)}>← Atrás</button>
              <button className="btn btn-success btn-full" onClick={saveAndFinish}>
                ✓ Finalizar trabajo
              </button>
            </div>
          </div>
        )}
        <div style={{height:20}}/>
      </div>
    </div>
  );
}

// ─── CONFORMITY SCREEN ────────────────────────────────────────────────────────
function ConformityScreen({user, jobId, navigate, goBack, showToast}){
  const [job,setJob]=useState(null);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [clientName,setClientName]=useState('');
  const [observations,setObservations]=useState('');
  const [signature,setSignature]=useState(null);
  const [photos,setPhotos]=useState([]);

  useEffect(()=>{
    db.ref('operaciones_jobs/'+jobId).once('value').then(s=>{
      const j=s.val();
      if(j){
        setJob({id:jobId,...j});
        setClientName(j.client||'');
        if(j.conformity){
          setClientName(j.conformity.clientName||j.client||'');
          setObservations(j.conformity.observations||'');
          setSignature(j.conformity.signature||null);
          setPhotos(j.conformity.photos||[]);
        }
      }
      setLoading(false);
    });
  },[jobId]);

  async function save(){
    if(!clientName.trim()||!signature){
      showToast('Completá nombre y firma del cliente','error'); return;
    }
    setSaving(true);
    const conformity={
      clientName:clientName.trim(),
      observations:observations.trim(),
      signature,
      photos,
      ts:Date.now(),
      signedBy:user.uid
    };
    await db.ref('operaciones_jobs/'+jobId).update({
      conformity,
      status:'completado',
      updatedAt:Date.now()
    });
    showToast('Conformidad registrada','success');
    goBack();
  }

  function shareWhatsApp(){
    if(!job?.clientPhone){showToast('Sin teléfono del cliente','error');return;}
    const msg=`¡Hola ${clientName}! El trabajo "${job.title}" ha sido completado por el equipo de Mundo M. Gracias por la confianza.`;
    window.open(whatsappUrl(job.clientPhone,msg),'_blank');
  }

  function printPDF(){
    // Build simple printable HTML
    const printWin=window.open('','_blank');
    if(!printWin) return;
    const date=new Date().toLocaleDateString('es-UY');
    const taskRows=(job?.tasks||[]).map(t=>`
      <tr><td>${t.completed?'✅':'⬜'}</td><td>${t.title}</td></tr>
    `).join('');
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
    <title>Conformidad — ${job?.title}</title>
    <style>
      body{font-family:Arial,sans-serif;padding:32px;max-width:700px;margin:auto;}
      h1{color:#F47920;} h2{color:#374151;border-bottom:1px solid #e5e7eb;padding-bottom:6px;}
      table{width:100%;border-collapse:collapse;margin-bottom:20px;}
      td,th{padding:6px 8px;border:1px solid #e5e7eb;font-size:13px;}
      .sig{border:1px solid #ccc;max-width:300px;}
      .footer{margin-top:40px;font-size:12px;color:#9ca3af;}
    </style></head><body>
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;">
      <img src="${window.MUNDOM_LOGO}" width="60" style="border-radius:50%"/>
      <div><h1 style="margin:0">Mundo M — Operaciones</h1><p style="margin:0;color:#6b7280">Registro de conformidad</p></div>
    </div>
    <h2>Datos del trabajo</h2>
    <table><tr><th>Campo</th><th>Valor</th></tr>
      <tr><td>Trabajo</td><td>${job?.title||''}</td></tr>
      <tr><td>Tipo</td><td>${JOB_TYPE_LABELS[job?.type]||''}</td></tr>
      <tr><td>Cliente</td><td>${job?.client||''}</td></tr>
      <tr><td>Dirección</td><td>${job?.clientAddress||'—'}</td></tr>
      <tr><td>Fecha</td><td>${job?.date||''}</td></tr>
      <tr><td>Fecha de conformidad</td><td>${date}</td></tr>
    </table>
    <h2>Tareas ejecutadas</h2>
    <table><tr><th>Estado</th><th>Tarea</th></tr>${taskRows||'<tr><td colspan=2>Sin tareas registradas</td></tr>'}</table>
    <h2>Conformidad del cliente</h2>
    <p><strong>Nombre:</strong> ${clientName}</p>
    <p><strong>Observaciones:</strong> ${observations||'Sin observaciones'}</p>
    ${signature?`<p><strong>Firma:</strong></p><img src="${signature}" class="sig"/>`: '<p><em>Sin firma</em></p>'}
    <div class="footer">
      Documento generado el ${date} | Mundo M — ${job?.client} | www.mundom.com.uy
    </div>
    </body></html>`;
    printWin.document.write(html);
    printWin.document.close();
    printWin.focus();
    setTimeout(()=>printWin.print(),500);
  }

  if(loading) return <LoadingShell title="Conformidad"/>;

  return (
    <div className="app-shell">
      <TopBar title="Conformidad del cliente" onBack={goBack}/>
      <div className="screen">
        <div className="alert alert-info">El cliente confirma que el trabajo fue realizado correctamente</div>

        <div className="card">
          <div className="card-title">Trabajo completado</div>
          <p style={{fontSize:14,fontWeight:700}}>{job?.title}</p>
          <p style={{fontSize:13,color:'var(--gray-500)'}}>{job?.client} · {job?.date}</p>
          {job?.tasks && (
            <div style={{marginTop:8}}>
              <ProgressBar value={(job.tasks||[]).filter(t=>t.completed).length} max={(job.tasks||[]).length}/>
              <p style={{fontSize:11,color:'var(--gray-500)',marginTop:3}}>
                {(job.tasks||[]).filter(t=>t.completed).length}/{(job.tasks||[]).length} tareas completadas
              </p>
            </div>
          )}
        </div>

        <div className="card">
          <Field label="Nombre del cliente que firma" required>
            <input value={clientName} onChange={e=>setClientName(e.target.value)} placeholder="Nombre completo"/>
          </Field>
          <Field label="Observaciones del cliente">
            <textarea value={observations} onChange={e=>setObservations(e.target.value)}
              placeholder="El cliente puede indicar observaciones o comentarios sobre el trabajo realizado..."/>
          </Field>
        </div>

        <div className="card">
          <div className="card-title">Fotos de entrega</div>
          <PhotoCapture photos={photos} onAdd={p=>setPhotos(ps=>[...ps,p])} onRemove={id=>setPhotos(ps=>ps.filter(p=>p.id!==id))} maxPhotos={6}/>
        </div>

        <div className="card">
          <div className="card-title">Firma del cliente</div>
          {signature ? (
            <div>
              <div className="alert alert-success">✓ Firma registrada</div>
              <img src={signature} alt="firma" style={{maxWidth:'100%',border:'1px solid var(--gray-200)',borderRadius:6,marginBottom:8}}/>
              <button className="btn btn-secondary btn-sm" onClick={()=>setSignature(null)}>Repetir firma</button>
            </div>
          ) : (
            <SignatureCanvas label="El cliente firma aquí" height={180} onSave={setSignature}/>
          )}
        </div>

        <button className="btn btn-success btn-full" onClick={save} disabled={saving} style={{fontSize:16,padding:14}}>
          {saving ? 'Guardando...' : '✓ Registrar conformidad'}
        </button>

        <div style={{display:'flex',gap:10,marginTop:10}}>
          <button className="btn btn-secondary btn-full" onClick={printPDF}>🖨️ PDF</button>
          {job?.clientPhone && (
            <button className="btn btn-full" style={{background:'#25d366',color:'#fff'}} onClick={shareWhatsApp}>
              WhatsApp
            </button>
          )}
        </div>
        {job?.clientEmail && (
          <button className="btn btn-full" style={{marginTop:8,background:'var(--blue)',color:'#fff'}} onClick={()=>{
            const subject=encodeURIComponent(`Conformidad de trabajo — ${job.title} — Mundo M`);
            const body=encodeURIComponent(
              `Estimado/a ${clientName},\n\n` +
              `Le informamos que el trabajo "${job.title}" realizado en ${job.clientAddress||'su local'} ha sido completado exitosamente por el equipo de Mundo M.\n\n` +
              `Fecha: ${job.date}\nTipo: ${JOB_TYPE_LABELS[job.type]||job.type}\n` +
              (observations?`Observaciones: ${observations}\n`:'')+
              `\nEn el PDF adjunto encontrará el registro completo con la firma de conformidad.\n\n` +
              `Gracias por confiar en Mundo M.\n\nSaludos,\nEquipo Mundo M\nwww.mundom.com.uy`
            );
            window.open(`mailto:${job.clientEmail}?subject=${subject}&body=${body}`,'_blank');
          }}>
            ✉️ Enviar email al cliente
          </button>
        )}
        <div style={{height:20}}/>
      </div>
    </div>
  );
}

// ─── METRICS DASHBOARD SCREEN ─────────────────────────────────────────────────
function MetricsDashboardScreen({user}){
  const [jobs,setJobs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [period,setPeriod]=useState('30'); // days

  useEffect(()=>{
    const ref=db.ref('operaciones_jobs');
    const h=ref.on('value',snap=>{
      const data=snap.val()||{};
      setJobs(Object.entries(data).map(([id,v])=>({id,...v})));
      setLoading(false);
    });
    return()=>ref.off('value',h);
  },[]);

  const days=Number(period);
  const cutoff=Date.now()-days*86400000;

  const filtered=useMemo(()=>
    jobs.filter(j=>{
      if(!j.date) return false;
      const ts=new Date(j.date+'T00:00:00').getTime();
      return ts>=cutoff;
    })
  ,[jobs,cutoff]);

  const total=filtered.length;
  const completado=filtered.filter(j=>j.status==='completado').length;
  const enCurso=filtered.filter(j=>j.status==='en_curso').length;
  const pendiente=filtered.filter(j=>j.status==='pendiente').length;
  const cancelado=filtered.filter(j=>j.status==='cancelado').length;
  const rate=total?Math.round(completado/total*100):0;

  // By type
  const byType=useMemo(()=>{
    const m={};
    filtered.forEach(j=>{ m[j.type]=(m[j.type]||0)+1; });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[filtered]);

  // Last 7 days bar chart
  const last7=useMemo(()=>{
    const days7=Array.from({length:7},(_,i)=>{
      const d=new Date(); d.setDate(d.getDate()-6+i);
      return {key:dateKey(d), label:d.toLocaleDateString('es-UY',{weekday:'short'})};
    });
    return days7.map(({key,label})=>({
      label,
      total:(jobs.filter(j=>j.date===key)).length,
      done:(jobs.filter(j=>j.date===key&&j.status==='completado')).length,
    }));
  },[jobs]);
  const maxBar=Math.max(1,...last7.map(d=>d.total));

  // By operator
  const byOperator=useMemo(()=>{
    const m={};
    filtered.forEach(j=>{
      (j.team||[]).forEach(uid=>{
        if(!m[uid]) m[uid]={uid,total:0,done:0};
        m[uid].total++;
        if(j.status==='completado') m[uid].done++;
      });
    });
    return Object.values(m).sort((a,b)=>b.total-a.total);
  },[filtered]);

  // Avg tasks completion
  const avgTasksRate=useMemo(()=>{
    const comp=filtered.filter(j=>j.status==='completado'&&(j.tasks||[]).length>0);
    if(!comp.length) return null;
    const avg=comp.reduce((s,j)=>{
      const done=j.tasks.filter(t=>t.completed).length;
      return s+done/j.tasks.length;
    },0)/comp.length;
    return Math.round(avg*100);
  },[filtered]);

  return (
    <div className="app-shell">
      <div className="top-bar"><MundoLogo size={32}/><h1>Métricas</h1></div>
      <div className="screen">
        {/* Period selector */}
        <div className="tab-bar" style={{marginBottom:16}}>
          {[['7','7 días'],['30','30 días'],['90','90 días']].map(([v,l])=>(
            <button key={v} className={`tab-btn${period===v?' active':''}`} onClick={()=>setPeriod(v)}>{l}</button>
          ))}
        </div>

        {loading ? <div style={{textAlign:'center',padding:40}}><div className="spinner" style={{margin:'auto'}}/></div> : (
          <>
            {/* Stats */}
            <div className="stat-grid">
              <div className="stat-box"><div className="stat-val">{total}</div><div className="stat-lbl">Total trabajos</div></div>
              <div className="stat-box"><div className="stat-val" style={{color:'var(--green)'}}>{rate}%</div><div className="stat-lbl">Completados</div></div>
              <div className="stat-box"><div className="stat-val" style={{color:'var(--blue)'}}>{enCurso}</div><div className="stat-lbl">En curso</div></div>
              <div className="stat-box"><div className="stat-val" style={{color:'var(--yellow)'}}>{pendiente}</div><div className="stat-lbl">Pendientes</div></div>
            </div>
            {avgTasksRate!==null && (
              <div className="card" style={{textAlign:'center'}}>
                <p style={{fontSize:13,color:'var(--gray-500)',marginBottom:4}}>Avg. completitud de tareas</p>
                <p style={{fontSize:32,fontWeight:800,color:'var(--green)'}}>{avgTasksRate}%</p>
                <ProgressBar value={avgTasksRate} max={100} color="var(--green)"/>
              </div>
            )}

            {/* Last 7 days chart */}
            <div className="card">
              <div className="card-title">Últimos 7 días</div>
              <div style={{display:'flex',alignItems:'flex-end',gap:6,height:80}}>
                {last7.map((d,i)=>(
                  <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                    <div style={{flex:1,width:'100%',display:'flex',flexDirection:'column',justifyContent:'flex-end',gap:2}}>
                      {d.done>0 && <div style={{background:'var(--green)',borderRadius:3,height:Math.max(4,Math.round(d.done/maxBar*60))+'px'}}/>}
                      {(d.total-d.done)>0 && <div style={{background:'var(--orange)',borderRadius:3,height:Math.max(4,Math.round((d.total-d.done)/maxBar*60))+'px'}}/>}
                    </div>
                    <span style={{fontSize:9,color:'var(--gray-400)'}}>{d.label}</span>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',gap:12,marginTop:8,justifyContent:'center'}}>
                <span style={{fontSize:11,color:'var(--green)',fontWeight:600}}>■ Completado</span>
                <span style={{fontSize:11,color:'var(--orange)',fontWeight:600}}>■ Otros</span>
              </div>
            </div>

            {/* By type */}
            {byType.length > 0 && (
              <div className="card">
                <div className="card-title">Por tipo de trabajo</div>
                {byType.map(([type,count])=>(
                  <div key={type} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                    <span style={{fontSize:20}}>{JOB_TYPE_ICONS[type]||'🔨'}</span>
                    <span style={{flex:1,fontSize:13,fontWeight:600}}>{JOB_TYPE_LABELS[type]||type}</span>
                    <Badge type="badge-orange">{count}</Badge>
                    <div style={{width:80}}>
                      <ProgressBar value={count} max={Math.max(...byType.map(x=>x[1]))} color="var(--orange)"/>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* By operator */}
            {byOperator.length > 0 && (
              <div className="card">
                <div className="card-title">Por operario</div>
                {byOperator.map(o=>(
                  <OpMetricRow key={o.uid} uid={o.uid} total={o.total} done={o.done}/>
                ))}
              </div>
            )}

            {total===0 && (
              <div className="empty-state"><div className="es-icon">📊</div><p>Sin datos en el período seleccionado</p></div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

function OpMetricRow({uid, total, done}){
  const [name,setName]=useState(uid);
  useEffect(()=>{
    db.ref('usuarios/'+uid+'/nombre').once('value').then(s=>{ if(s.val()) setName(s.val()); });
  },[uid]);
  const rate=total?Math.round(done/total*100):0;
  return (
    <div style={{marginBottom:10}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
        <Avatar name={name} size={28}/>
        <span style={{flex:1,fontSize:13,fontWeight:600}}>{name}</span>
        <span style={{fontSize:12,color:'var(--gray-500)'}}>{done}/{total}</span>
        <Badge type={rate>=80?'badge-green':rate>=50?'badge-yellow':'badge-gray'}>{rate}%</Badge>
      </div>
      <ProgressBar value={done} max={total} color={rate>=80?'var(--green)':rate>=50?'var(--yellow)':'var(--gray-400)'}/>
    </div>
  );
}

// ─── ADMIN SCREEN ─────────────────────────────────────────────────────────────
function AdminScreen({user, navigate, showToast, confirm}){
  const [tab,setTab]=useState('users');
  const [users,setUsers]=useState([]);
  const [templates,setTemplates]=useState([]);

  useEffect(()=>{
    const ref=db.ref('usuarios');
    const h=ref.on('value',snap=>{
      const d=snap.val()||{};
      setUsers(Object.entries(d).map(([uid,u])=>({uid,...u})));
    });
    return()=>ref.off('value',h);
  },[]);

  useEffect(()=>{
    const ref=db.ref('operaciones_templates');
    const h=ref.on('value',snap=>{
      const d=snap.val()||{};
      setTemplates(Object.entries(d).map(([id,t])=>({id,...t})));
    });
    return()=>ref.off('value',h);
  },[]);

  async function toggleUser(uid,activo){
    await db.ref('usuarios/'+uid+'/activo').set(!activo);
    showToast(!activo?'Usuario activado':'Usuario desactivado','success');
  }
  async function deleteUser(uid){
    confirm('¿Eliminar este usuario? No podrá ingresar a ninguna app.',async()=>{
      await db.ref('usuarios/'+uid).remove();
      showToast('Usuario eliminado','success');
    });
  }
  async function deleteTemplate(id){
    confirm('¿Eliminar esta plantilla?',async()=>{
      await db.ref('operaciones_templates/'+id).remove();
      showToast('Plantilla eliminada','success');
    });
  }

  return (
    <div className="app-shell">
      <div className="top-bar"><MundoLogo size={32}/><h1>Administración</h1></div>
      <div className="screen">
        <div className="tab-bar">
          <button className={`tab-btn${tab==='users'?' active':''}`} onClick={()=>setTab('users')}>👥 Usuarios</button>
          <button className={`tab-btn${tab==='templates'?' active':''}`} onClick={()=>setTab('templates')}>📋 Plantillas</button>
        </div>

        {/* USERS TAB */}
        {tab==='users' && (
          <div>
            <div className="section-head">
              <h2>Usuarios ({users.length})</h2>
              <button className="btn btn-primary btn-sm" onClick={()=>navigate('userCreate',{})}>+ Nuevo</button>
            </div>
            {users.map(u=>(
              <div key={u.uid} className="card" style={{marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <Avatar name={u.nombre} size={40} color={u.activo?'var(--orange)':'var(--gray-300)'}/>
                  <div style={{flex:1}}>
                    <p style={{fontSize:14,fontWeight:700}}>{u.nombre}</p>
                    <p style={{fontSize:12,color:'var(--gray-500)'}}>{u.email}</p>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'flex-end'}}>
                    <RoleBadge rol={u.rol}/>
                    <Badge type={u.activo?'badge-green':'badge-gray'}>{u.activo?'Activo':'Inactivo'}</Badge>
                  </div>
                </div>
                <div style={{display:'flex',gap:8,marginTop:10}}>
                  <button className="btn btn-sm btn-secondary" onClick={()=>toggleUser(u.uid,u.activo)}>
                    {u.activo?'Desactivar':'Activar'}
                  </button>
                  {u.uid!==user.uid && (
                    <button className="btn btn-sm btn-danger" onClick={()=>deleteUser(u.uid)}>Eliminar</button>
                  )}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* TEMPLATES TAB */}
        {tab==='templates' && (
          <div>
            <div className="section-head">
              <h2>Plantillas ({templates.length})</h2>
              <button className="btn btn-primary btn-sm" onClick={()=>navigate('templateEdit',{})}>+ Nueva</button>
            </div>
            <div className="alert alert-info">Las plantillas por defecto están integradas. Acá podés agregar plantillas personalizadas.</div>
            {/* Show default templates as read-only */}
            {Object.entries(DEFAULT_TEMPLATES).map(([k,t])=>(
              <div key={k} className="card" style={{marginBottom:10,opacity:.8}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:28}}>{JOB_TYPE_ICONS[t.type]}</span>
                  <div style={{flex:1}}>
                    <p style={{fontSize:14,fontWeight:700}}>{t.name}</p>
                    <p style={{fontSize:12,color:'var(--gray-500)'}}>{t.tasks.length} tareas · {t.materials.length} materiales · {t.safetyEquipment.length} EPP</p>
                  </div>
                  <Badge type="badge-gray">Default</Badge>
                </div>
              </div>
            ))}
            {templates.map(t=>(
              <div key={t.id} className="card" style={{marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:28}}>{JOB_TYPE_ICONS[t.type]||'📋'}</span>
                  <div style={{flex:1}}>
                    <p style={{fontSize:14,fontWeight:700}}>{t.name}</p>
                    <p style={{fontSize:12,color:'var(--gray-500)'}}>{(t.tasks||[]).length} tareas</p>
                  </div>
                  <Badge type="badge-orange">Custom</Badge>
                </div>
                <div style={{display:'flex',gap:8,marginTop:10}}>
                  <button className="btn btn-sm btn-secondary" onClick={()=>navigate('templateEdit',{editId:t.id})}>Editar</button>
                  <button className="btn btn-sm btn-danger" onClick={()=>deleteTemplate(t.id)}>Eliminar</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── USER CREATE SCREEN ───────────────────────────────────────────────────────
function UserCreateScreen({user, goBack, showToast}){
  const [nombre,setNombre]=useState('');
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [rol,setRol]=useState('operario');
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');

  async function create(){
    if(!nombre.trim()||!email.trim()||password.length<6){
      setErr('Completá todos los campos. Contraseña mínimo 6 caracteres.'); return;
    }
    setSaving(true); setErr('');
    try{
      // Use secondary app instance to create user without logging out current user
      const secondApp = firebase.apps.length>1
        ? firebase.app('secondary')
        : firebase.initializeApp(FIREBASE_CONFIG,'secondary');
      const secondAuth = secondApp.auth();
      const cred = await secondAuth.createUserWithEmailAndPassword(email.trim(), password);
      await db.ref('usuarios/'+cred.user.uid).set({
        nombre:nombre.trim(), email:email.trim(), rol, activo:true,
        createdAt:Date.now(), createdBy:user.uid
      });
      await secondAuth.signOut();
      showToast('Usuario creado: '+nombre,'success');
      goBack();
    } catch(e){
      setErr(e.message||'Error al crear usuario');
      setSaving(false);
    }
  }

  return (
    <div className="app-shell">
      <TopBar title="Nuevo usuario" onBack={goBack}/>
      <div className="screen">
        <Field label="Nombre completo" required>
          <input value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Juan Pérez"/>
        </Field>
        <Field label="Email" required>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="juan@mundoM.com"/>
        </Field>
        <Field label="Contraseña temporal" required hint="Mínimo 6 caracteres. El usuario puede cambiarla después.">
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••"/>
        </Field>
        <Field label="Rol">
          <select value={rol} onChange={e=>setRol(e.target.value)}>
            {Object.entries(ROLE_LABELS).map(([v,l])=><option key={v} value={v}>{l}</option>)}
          </select>
        </Field>
        {err && <p style={{color:'var(--red)',fontSize:13,marginBottom:12}}>{err}</p>}
        <button className="btn btn-primary btn-full" onClick={create} disabled={saving} style={{fontSize:15,padding:14}}>
          {saving ? 'Creando...' : '+ Crear usuario'}
        </button>
      </div>
    </div>
  );
}

// ─── TEMPLATE EDIT SCREEN ─────────────────────────────────────────────────────
function TemplateEditScreen({editId, goBack, showToast}){
  const [name,setName]=useState('');
  const [type,setType]=useState('racks');
  const [tasks,setTasks]=useState([]);
  const [materials,setMaterials]=useState([]);
  const [safetyEquipment,setSafetyEquipment]=useState([]);
  const [saving,setSaving]=useState(false);
  const [newTask,setNewTask]=useState('');
  const [newMat,setNewMat]=useState('');
  const [newSafety,setNewSafety]=useState('');

  useEffect(()=>{
    if(!editId) return;
    db.ref('operaciones_templates/'+editId).once('value').then(s=>{
      const t=s.val();
      if(!t) return;
      setName(t.name||'');
      setType(t.type||'racks');
      setTasks(t.tasks||[]);
      setMaterials(t.materials||[]);
      setSafetyEquipment(t.safetyEquipment||[]);
    });
  },[editId]);

  async function save(){
    if(!name.trim()){showToast('Ingresá un nombre','error');return;}
    setSaving(true);
    const data={name:name.trim(),type,tasks,materials,safetyEquipment,updatedAt:Date.now()};
    if(editId) await db.ref('operaciones_templates/'+editId).update(data);
    else await db.ref('operaciones_templates').push(data);
    showToast('Plantilla guardada','success');
    goBack();
  }

  return (
    <div className="app-shell">
      <TopBar title={editId?'Editar plantilla':'Nueva plantilla'} onBack={goBack} actions={
        <button className="btn btn-sm" style={{background:'rgba(255,255,255,.2)',color:'#fff',border:'none'}} onClick={save} disabled={saving}>
          {saving?'...':'💾'}
        </button>
      }/>
      <div className="screen">
        <Field label="Nombre de la plantilla" required>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Ej: Góndolas supermercado grande"/>
        </Field>
        <Field label="Tipo">
          <select value={type} onChange={e=>setType(e.target.value)}>
            {JOB_TYPES.map(t=><option key={t} value={t}>{JOB_TYPE_ICONS[t]} {JOB_TYPE_LABELS[t]}</option>)}
          </select>
        </Field>
        <div className="divider"/>
        <div className="section-head"><h2>Tareas</h2></div>
        {tasks.map((t,i)=>(
          <div key={i} style={{display:'flex',gap:8,alignItems:'center',padding:'6px 0'}}>
            <span style={{flex:1,fontSize:13}}>{t.title}</span>
            <button onClick={()=>setTasks(ts=>ts.filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer'}}>✕</button>
          </div>
        ))}
        <div className="input-row">
          <Field><input value={newTask} onChange={e=>setNewTask(e.target.value)} placeholder="Nueva tarea..." onKeyPress={e=>e.key==='Enter'&&(setTasks(ts=>[...ts,{title:newTask.trim()}]),setNewTask(''))}/></Field>
          <button className="btn btn-primary" onClick={()=>{if(newTask.trim()){setTasks(ts=>[...ts,{title:newTask.trim()}]);setNewTask('');}}}>+</button>
        </div>
        <div className="divider"/>
        <div className="section-head"><h2>Materiales base</h2></div>
        {materials.map((m,i)=>(
          <div key={i} style={{display:'flex',gap:8,alignItems:'center',padding:'6px 0'}}>
            <span style={{flex:1,fontSize:13}}>{m.name}</span>
            <button onClick={()=>setMaterials(ms=>ms.filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer'}}>✕</button>
          </div>
        ))}
        <div className="input-row">
          <Field><input value={newMat} onChange={e=>setNewMat(e.target.value)} placeholder="Material..." onKeyPress={e=>e.key==='Enter'&&(setMaterials(ms=>[...ms,{name:newMat.trim(),qty:0,unit:'u'}]),setNewMat(''))}/></Field>
          <button className="btn btn-primary" onClick={()=>{if(newMat.trim()){setMaterials(ms=>[...ms,{name:newMat.trim(),qty:0,unit:'u'}]);setNewMat('');}}}>+</button>
        </div>
        <div className="divider"/>
        <div className="section-head"><h2>EPP requerido</h2></div>
        {safetyEquipment.map((s,i)=>(
          <div key={i} style={{display:'flex',gap:8,alignItems:'center',padding:'6px 0'}}>
            <span style={{flex:1,fontSize:13}}>🦺 {s.name}</span>
            <button onClick={()=>setSafetyEquipment(se=>se.filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer'}}>✕</button>
          </div>
        ))}
        <div className="input-row">
          <Field><input value={newSafety} onChange={e=>setNewSafety(e.target.value)} placeholder="EPP..." onKeyPress={e=>e.key==='Enter'&&(setSafetyEquipment(se=>[...se,{name:newSafety.trim()}]),setNewSafety(''))}/></Field>
          <button className="btn btn-primary" onClick={()=>{if(newSafety.trim()){setSafetyEquipment(se=>[...se,{name:newSafety.trim()}]);setNewSafety('');}}}>+</button>
        </div>
        <div className="divider"/>
        <button className="btn btn-primary btn-full" onClick={save} disabled={saving} style={{fontSize:15,padding:14}}>
          {saving?'Guardando...':'💾 Guardar plantilla'}
        </button>
        <div style={{height:20}}/>
      </div>
    </div>
  );
}
