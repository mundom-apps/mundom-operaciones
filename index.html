<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#F47920"/>
<title>Mundo M — Operaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --orange:#F47920;--orange-d:#d4651a;--orange-l:#fff3ea;
  --gray-900:#111827;--gray-800:#1f2937;--gray-700:#374151;
  --gray-600:#4b5563;--gray-500:#6b7280;--gray-400:#9ca3af;
  --gray-300:#d1d5db;--gray-200:#e5e7eb;--gray-100:#f3f4f6;--gray-50:#f9fafb;
  --green:#16a34a;--green-l:#dcfce7;--red:#dc2626;--red-l:#fee2e2;
  --blue:#2563eb;--blue-l:#dbeafe;--yellow:#ca8a04;--yellow-l:#fef9c3;
  --purple:#7c3aed;--purple-l:#ede9fe;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);
  --shadow-lg:0 10px 25px rgba(0,0,0,.15);
  --sidebar:240px;
}
html,body,#root{height:100%;font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--gray-100);color:var(--gray-900);}
body{overflow-x:hidden;background:#f0f2f5;}

/* ── MOBILE LAYOUT ── */
.app-shell{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;background:#fff;position:relative;}
.top-bar{background:var(--orange);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.top-bar h1{font-size:18px;font-weight:800;flex:1;}
.screen{flex:1;overflow-y:auto;padding:16px;padding-bottom:80px;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--gray-200);display:flex;z-index:100;}
.bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border:none;background:none;font-size:10px;color:var(--gray-500);cursor:pointer;transition:color .2s;}
.bottom-nav button.active{color:var(--orange);}
.bottom-nav button svg{width:22px;height:22px;}

/* ── DESKTOP LAYOUT ── */
@media(min-width:769px){
  html,body,#root{background:#f0f2f5;}
  .app-shell{max-width:100%;height:100vh;overflow:hidden;background:transparent;box-shadow:none;flex-direction:row;}
  /* Sidebar */
  .bottom-nav{
    position:fixed;left:0;top:0;bottom:0;width:var(--sidebar);
    flex-direction:column;justify-content:flex-start;align-items:stretch;
    border-top:none;border-right:1px solid var(--gray-200);
    padding:0 12px 20px;background:#fff;
    box-shadow:2px 0 12px rgba(0,0,0,.06);
    transform:none;max-width:none;gap:4px;
    overflow-y:auto;
  }
  .bottom-nav::before{
    content:'Mundo M';display:block;
    font-size:20px;font-weight:900;color:var(--orange);
    padding:20px 12px 16px;letter-spacing:-0.5px;
    border-bottom:1px solid var(--gray-100);margin-bottom:12px;
  }
  .bottom-nav button{
    flex-direction:row;justify-content:flex-start;align-items:center;
    padding:12px 14px;border-radius:10px;font-size:14px;font-weight:700;
    gap:12px;flex:none;width:100%;color:var(--gray-600);
  }
  .bottom-nav button svg{width:20px;height:20px;flex-shrink:0;}
  .bottom-nav button.active{background:var(--orange-l);color:var(--orange);}
  .bottom-nav button:hover:not(.active){background:var(--gray-50);}
  /* Top bar */
  .top-bar{margin-left:var(--sidebar);position:sticky;top:0;border-radius:0;padding:16px 32px;}
  .top-bar h1{font-size:20px;}
  /* Screen */
  .screen{margin-left:var(--sidebar);flex:1;height:100vh;overflow-y:auto;padding:28px 36px 40px;padding-bottom:40px;background:#f0f2f5;}
  /* Cards */
  .card{border-radius:14px;padding:20px 24px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
  .card-title{font-size:16px;}
  /* Job grid */
  .jobs-list{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .jobs-list .job-card{margin-bottom:0;}
  /* Stat grid */
  .stat-grid{grid-template-columns:repeat(4,1fr);}
  /* Fab */
  .fab{position:fixed;bottom:32px;right:40px;transform:none;left:auto;width:56px;height:56px;font-size:28px;}
  /* Inputs */
  .field input,.field select,.field textarea{font-size:15px;padding:12px 14px;}
  .field label{font-size:14px;margin-bottom:6px;}
  .btn{font-size:15px;padding:11px 20px;}
  .btn-sm{font-size:13px;padding:7px 14px;}
  /* Modal */
  .modal-overlay{align-items:center;}
  .modal-box{border-radius:16px;margin:24px;max-height:85vh;max-width:560px;}
  .modal-box.center{margin:24px auto;}
  /* Section head */
  .section-head h2{font-size:18px;}
  /* Badge */
  .badge{font-size:12px;padding:4px 10px;}
  /* Toast */
  .toast-container{top:80px;max-width:480px;}
  /* Hide logo from top bar on desktop (sidebar has brand) */
  .top-bar .mundom-logo-wrap{display:none;}
}

/* ── CARDS ── */
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;}
.card-title{font-size:15px;font-weight:800;color:var(--gray-800);margin-bottom:8px;}
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:hover:not(:disabled){background:var(--orange-d);}
.btn-secondary{background:var(--gray-200);color:var(--gray-700);}
.btn-secondary:hover:not(:disabled){background:var(--gray-300);}
.btn-success{background:var(--green);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-ghost{background:none;color:var(--orange);border:1.5px solid var(--orange);}
.btn-sm{padding:6px 12px;font-size:13px;}
.btn-full{width:100%;}
.btn-icon{width:36px;height:36px;padding:0;border-radius:50%;}
/* ── INPUTS ── */
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:700;color:var(--gray-700);margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:14px;background:#fff;color:var(--gray-900);transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--orange);}
.field textarea{resize:vertical;min-height:80px;}
/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;}
.badge-orange{background:var(--orange-l);color:var(--orange-d);}
.badge-green{background:var(--green-l);color:var(--green);}
.badge-red{background:var(--red-l);color:var(--red);}
.badge-blue{background:var(--blue-l);color:var(--blue);}
.badge-yellow{background:var(--yellow-l);color:var(--yellow);}
.badge-purple{background:var(--purple-l);color:var(--purple);}
.badge-gray{background:var(--gray-200);color:var(--gray-600);}
/* ── AVATAR ── */
.avatar{width:36px;height:36px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;}
/* ── CHECK ITEM ── */
.check-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--gray-50);border-radius:8px;margin-bottom:6px;cursor:pointer;border:1.5px solid var(--gray-200);transition:all .15s;}
.check-item.checked{background:var(--green-l);border-color:var(--green);}
.check-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--green);flex-shrink:0;}
.check-item span{font-size:14px;flex:1;}
.check-item.checked span{color:var(--green);text-decoration:line-through;}
/* ── SECTION HEAD ── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.section-head h2{font-size:16px;font-weight:800;color:var(--gray-800);}
/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:20px;}
.modal-box.center{border-radius:16px;margin:16px;max-height:85vh;}
.modal-handle{width:40px;height:4px;background:var(--gray-300);border-radius:2px;margin:0 auto 16px;}
/* ── LOADING ── */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;background:#fff;}
.spinner{width:44px;height:44px;border:4px solid var(--gray-200);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── TOAST ── */
.toast-container{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:calc(100% - 32px);max-width:440px;}
.toast{padding:12px 16px;border-radius:10px;font-size:14px;font-weight:700;color:#fff;box-shadow:var(--shadow-lg);animation:slideIn .3s ease;text-align:center;}
.toast-success{background:var(--green);}
.toast-error{background:var(--red);}
.toast-info{background:var(--orange);}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
/* ── CALENDAR ── */
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;}
.cal-day{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border-radius:8px;cursor:pointer;transition:all .15s;min-height:48px;}
.cal-day:hover{background:var(--gray-100);}
.cal-day.active{background:var(--orange);color:#fff;}
.cal-day .day-name{font-size:10px;font-weight:700;text-transform:uppercase;opacity:.7;}
.cal-day .day-num{font-size:18px;font-weight:800;}
.cal-day .day-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);}
.cal-day.active .day-dot{background:#fff;}
/* ── CALENDAR RESPONSIVE ── */
.cal-upcoming{width:280px;flex-shrink:0;}
.cal-month-panel{width:320px;flex-shrink:0;}
@media(max-width:768px){
  .cal-upcoming{display:none!important;}
  .cal-month-panel{width:100%!important;}
  .cal-year-grid{grid-template-columns:repeat(2,1fr)!important;}
}
/* ── JOB CARD ── */
.job-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:10px;border-left:4px solid var(--orange);cursor:pointer;transition:all .15s;}
.job-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px);}
.job-card .jc-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.job-card .jc-title{font-size:15px;font-weight:800;color:var(--gray-900);flex:1;}
.job-card .jc-client{font-size:13px;color:var(--gray-500);margin-top:2px;}
.job-card .jc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.job-card.status-en_curso{border-left-color:var(--blue);}
.job-card.status-completado{border-left-color:var(--green);}
.job-card.status-cancelado{border-left-color:var(--gray-400);}
/* ── SIG CANVAS ── */
.sig-canvas-wrap{border:2px dashed var(--gray-300);border-radius:8px;background:var(--gray-50);overflow:hidden;touch-action:none;}
.sig-canvas-wrap canvas{display:block;width:100%;cursor:crosshair;}
/* ── STEPS ── */
.steps{display:flex;align-items:center;margin-bottom:20px;}
.step{display:flex;align-items:center;gap:6px;flex:1;}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;transition:all .2s;}
.step-circle.done{background:var(--green);color:#fff;}
.step-circle.active{background:var(--orange);color:#fff;}
.step-circle.pending{background:var(--gray-200);color:var(--gray-500);}
.step-line{flex:1;height:2px;background:var(--gray-200);}
.step-line.done{background:var(--green);}
/* ── USER CHIP ── */
.user-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--gray-100);border-radius:20px;font-size:13px;font-weight:700;}
/* ── METRICS ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-box{background:var(--gray-50);border-radius:12px;padding:16px;text-align:center;}
.stat-box .stat-val{font-size:32px;font-weight:900;color:var(--orange);}
.stat-box .stat-lbl{font-size:12px;color:var(--gray-500);margin-top:3px;font-weight:700;}
/* ── MAP ── */
#ops-map{height:250px;border-radius:8px;overflow:hidden;z-index:1;}
/* ── PHOTO GRID ── */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;}
/* ── DIVIDER ── */
.divider{height:1px;background:var(--gray-200);margin:16px 0;}
/* ── ALERT ── */
.alert{padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;font-weight:600;}
.alert-info{background:var(--blue-l);color:var(--blue);}
.alert-warning{background:var(--yellow-l);color:var(--yellow);}
.alert-success{background:var(--green-l);color:var(--green);}
/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 20px;color:var(--gray-400);}
.empty-state .es-icon{font-size:56px;margin-bottom:16px;}
.empty-state p{font-size:15px;font-weight:600;}
/* ── PROGRESS BAR ── */
.progress-bar{height:6px;background:var(--gray-200);border-radius:3px;overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s;}
/* ── TAB BAR ── */
.tab-bar{display:flex;background:var(--gray-100);border-radius:10px;padding:4px;margin-bottom:16px;overflow-x:auto;gap:2px;}
.tab-btn{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-size:13px;font-weight:700;color:var(--gray-500);cursor:pointer;transition:all .15s;white-space:nowrap;}
.tab-btn.active{background:#fff;color:var(--gray-900);box-shadow:var(--shadow);}
/* ── CHIPS ── */
.chips-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-ms-overflow-style:none;scrollbar-width:none;}
.chips-row::-webkit-scrollbar{display:none;}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--gray-300);font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer;background:#fff;transition:all .15s;}
.chip:hover{border-color:var(--orange);}
.chip.active{background:var(--orange);border-color:var(--orange);color:#fff;}
/* ── INPUT ROW ── */
.input-row{display:flex;gap:8px;align-items:flex-end;}
.input-row .field{flex:1;margin:0;}
/* ── TOGGLE ── */
.toggle-wrap{display:flex;align-items:center;justify-content:space-between;padding:10px 0;}
.toggle-wrap span{font-size:14px;font-weight:700;color:var(--gray-700);}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--gray-300);border-radius:24px;transition:.3s;}
.toggle-slider:before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle input:checked+.toggle-slider{background:var(--orange);}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px);}
/* ── FAB ── */
.fab{position:fixed;bottom:90px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--orange);color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(244,121,32,.5);display:flex;align-items:center;justify-content:center;z-index:99;transition:all .2s;}
.fab:hover{background:var(--orange-d);transform:scale(1.08);}
</style>
</head>
<body>

// ─── UTILITIES ────────────────────────────────────────────────────────────────
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }

function fmtDate(ts){
  if(!ts) return '';
  const d=new Date(ts);
  return d.toLocaleDateString('es-UY',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function fmtTime(ts){
  if(!ts) return '';
  return new Date(ts).toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit'});
}
function fmtDuration(ms){
  if(!ms||ms<0) return '-';
  const m=Math.round(ms/60000);
  if(m<60) return m+'min';
  return Math.floor(m/60)+'h '+( m%60 ? (m%60)+'min' : '');
}
function dateKey(ts){ // "YYYY-MM-DD"
  const d=new Date(ts||Date.now());
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function getWeekDays(refDate){
  const d=new Date(refDate);
  const day=d.getDay(); // 0=sun
  const mon=new Date(d); mon.setDate(d.getDate()-(day===0?6:day-1));
  return Array.from({length:7},(_,i)=>{ const x=new Date(mon); x.setDate(mon.getDate()+i); return x; });
}
function initials(name=''){
  return name.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?';
}
function canEdit(user){
  return user&&(user.rol===ROLES.admin||user.rol===ROLES.coordinadora||user.rol===ROLES.comercial);
}
function canCreate(user){
  return user&&(user.rol===ROLES.admin||user.rol===ROLES.coordinadora||user.rol===ROLES.comercial);
}
function canViewAll(user){
  return user&&(user.rol===ROLES.admin||user.rol===ROLES.coordinadora||user.rol===ROLES.jefa||user.rol===ROLES.comercial);
}
function whatsappUrl(phone,msg){
  const clean=phone.replace(/\D/g,'');
  return `https://wa.me/${clean}?text=${encodeURIComponent(msg)}`;
}

function useToast(){
  const [toasts,setToasts]=useState([]);
  const show=useCallback((msg,type='info',dur=2800)=>{
    const id=uid();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),dur);
  },[]);
  const ToastContainer=()=>(
    <div className="toast-container">
      {toasts.map(t=>(
        <div key={t.id} className={`toast toast-${t.type}`}>{t.msg}</div>
      ))}
    </div>
  );
  return {show, ToastContainer};
}

// ─── SIGNATURE CANVAS ─────────────────────────────────────────────────────────
function SignatureCanvas({onSave, height=160, label='Firmar aquí'}){
  const canvasRef=useRef(null);
  const drawing=useRef(false);
  const lastPt=useRef(null);

  function getPos(e,canvas){
    const r=canvas.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return {x:(src.clientX-r.left)*(canvas.width/r.width), y:(src.clientY-r.top)*(canvas.height/r.height)};
  }
  function start(e){
    e.preventDefault();
    drawing.current=true;
    const pt=getPos(e,canvasRef.current);
    lastPt.current=pt;
    const ctx=canvasRef.current.getContext('2d');
    ctx.beginPath(); ctx.arc(pt.x,pt.y,1,0,Math.PI*2); ctx.fill();
  }
  function move(e){
    e.preventDefault();
    if(!drawing.current) return;
    const canvas=canvasRef.current;
    const ctx=canvas.getContext('2d');
    const pt=getPos(e,canvas);
    ctx.beginPath();
    ctx.moveTo(lastPt.current.x,lastPt.current.y);
    ctx.lineTo(pt.x,pt.y);
    ctx.strokeStyle='#111'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.stroke();
    lastPt.current=pt;
  }
  function end(){ drawing.current=false; }

  function clear(){
    const c=canvasRef.current;
    c.getContext('2d').clearRect(0,0,c.width,c.height);
  }
  function save(){
    const c=canvasRef.current;
    const ctx=c.getContext('2d');
    const data=ctx.getImageData(0,0,c.width,c.height).data;
    const hasContent=Array.from(data).some((v,i)=>i%4===3&&v>0);
    if(!hasContent){alert('Por favor firma antes de guardar.');return;}
    onSave(c.toDataURL('image/png'));
  }

  return (
    <div>
      <p style={{fontSize:12,color:'var(--gray-500)',marginBottom:6}}>{label}</p>
      <div className="sig-canvas-wrap">
        <canvas ref={canvasRef} width={400} height={height}
          onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}
        />
      </div>
      <div style={{display:'flex',gap:8,marginTop:8}}>
        <button className="btn btn-secondary btn-sm" onClick={clear}>Borrar</button>
        <button className="btn btn-success btn-sm" onClick={save}>Guardar firma</button>
      </div>
    </div>
  );
}

/* ── ADDRESS MAP PREVIEW ── */
function AddressMapPreview({address, autoShow}){
  const mapRef=React.useRef(null);
  const mapInstance=React.useRef(null);
  const markerRef=React.useRef(null);
  const [coords,setCoords]=React.useState(null);
  const [loading,setLoading]=React.useState(false);
  const [error,setError]=React.useState('');
  const [visible,setVisible]=React.useState(false);
  const debounceRef=React.useRef(null);
  const lastAddr=React.useRef('');

  async function geocode(addr){
    if(!addr||addr.length<6) return;
    setLoading(true); setError(''); setCoords(null); setVisible(false);
    try{
      const q=encodeURIComponent(addr+', Uruguay');
      const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&countrycodes=uy`,{headers:{'Accept-Language':'es','User-Agent':'MundoM-Operaciones/1.0'}});
      const d=await r.json();
      if(!d.length){setError('No se encontró. Añadí ciudad o calle más completa.');setLoading(false);return;}
      const lat=parseFloat(d[0].lat), lng=parseFloat(d[0].lon);
      setCoords({lat,lng,display:d[0].display_name});
      setVisible(true);
    }catch(e){setError('Error de conexión al buscar mapa.');}
    setLoading(false);
  }

  // Auto-geocode when address changes (debounced 900ms)
  React.useEffect(()=>{
    if(!address) return;
    if(address===lastAddr.current) return;
    lastAddr.current=address;
    clearTimeout(debounceRef.current);
    if(address.length>=8){
      debounceRef.current=setTimeout(()=>geocode(address), 900);
    }
    return()=>clearTimeout(debounceRef.current);
  },[address]);

  // Render map when coords arrive
  React.useEffect(()=>{
    if(!visible||!coords||!mapRef.current) return;
    if(!window.L) return;
    setTimeout(()=>{
      if(!mapRef.current) return;
      if(mapInstance.current){mapInstance.current.remove();mapInstance.current=null;}
      mapInstance.current=window.L.map(mapRef.current,{zoomControl:true,attributionControl:false}).setView([coords.lat,coords.lng],16);
      window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance.current);
      markerRef.current=window.L.marker([coords.lat,coords.lng]).addTo(mapInstance.current);
      markerRef.current.bindPopup(address).openPopup();
    },120);
    return()=>{if(mapInstance.current){mapInstance.current.remove();mapInstance.current=null;}};
  },[visible,coords]);

  if(!address) return null;
  return (
    <div style={{marginTop:6}}>
      {loading && <p style={{fontSize:12,color:'var(--gray-500)',display:'flex',alignItems:'center',gap:4}}>
        <span style={{display:'inline-block',width:12,height:12,border:'2px solid var(--gray-300)',borderTopColor:'var(--orange)',borderRadius:'50%',animation:'spin .7s linear infinite'}}></span> Buscando dirección...
      </p>}
      {error && <p style={{fontSize:12,color:'var(--red)',marginBottom:4}}>⚠️ {error}</p>}
      {coords && (
        <div>
          <p style={{fontSize:11,color:'var(--green)',marginBottom:4,fontWeight:700}}>✓ {coords.display.split(',').slice(0,3).join(', ')}</p>
          <div style={{display:'flex',gap:6,marginBottom:6}}>
            <button type="button" className="btn btn-secondary btn-sm" onClick={()=>{setCoords(null);setVisible(false);}} style={{fontSize:11}}>✕ Cerrar mapa</button>
            <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`} target="_blank" rel="noopener noreferrer" className="btn btn-sm" style={{fontSize:11,background:'#4285F4',color:'#fff',textDecoration:'none'}}>🗺️ Google Maps</a>
          </div>
          {visible && <div ref={mapRef} style={{height:200,borderRadius:10,overflow:'hidden',border:'1.5px solid var(--gray-200)',marginBottom:4}}/>}
        </div>
      )}
    </div>
  );
}

// ─── GPS CAPTURE ──────────────────────────────────────────────────────────────
function GpsCapture({label, value, onCapture}){
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(null);

  function capture(){
    if(!navigator.geolocation){setErr('GPS no disponible'); return;}
    setLoading(true); setErr(null);
    navigator.geolocation.getCurrentPosition(
      pos=>{
        setLoading(false);
        onCapture({lat:pos.coords.latitude, lng:pos.coords.longitude, acc:Math.round(pos.coords.accuracy), ts:Date.now()});
      },
      e=>{setLoading(false); setErr('No se pudo obtener ubicación');},
      {enableHighAccuracy:true, timeout:15000, maximumAge:0}
    );
  }
  return (
    <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:value?'var(--green-l)':'var(--gray-50)',borderRadius:8,border:`1.5px solid ${value?'var(--green)':'var(--gray-300)'}`}}>
      <span style={{fontSize:22}}>{value?'📍':'🗺️'}</span>
      <div style={{flex:1}}>
        <p style={{fontSize:13,fontWeight:700,color:value?'var(--green)':'var(--gray-700)'}}>{label}</p>
        {value ? (
          <p style={{fontSize:11,color:'var(--gray-500)'}}>
            {value.lat.toFixed(5)}, {value.lng.toFixed(5)} · ±{value.acc}m · {fmtTime(value.ts)}
          </p>
        ) : (
          <p style={{fontSize:11,color:'var(--gray-400)'}}>Sin capturar</p>
        )}
        {err && <p style={{fontSize:11,color:'var(--red)'}}>{err}</p>}
      </div>
      <button className="btn btn-sm" style={{background:value?'var(--green)':'var(--orange)',color:'#fff'}}
        onClick={capture} disabled={loading}>
        {loading ? '...' : value ? 'Recapturar' : 'Capturar'}
      </button>
    </div>
  );
}

function LoginScreen({noUsers}){
  const [tab,setTab]=useState('login');
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [regNombre,setRegNombre]=useState('');
  const [regEmail,setRegEmail]=useState('');
  const [regPass,setRegPass]=useState('');
  const [regPass2,setRegPass2]=useState('');
  const [loading,setLoading]=useState(false);
  const [googleLoading,setGoogleLoading]=useState(false);
  const [err,setErr]=useState('');

  async function login(e){
    e.preventDefault();
    setLoading(true); setErr('');
    try{
      await auth.signInWithEmailAndPassword(email.trim(), pass);
    } catch(ex){
      setErr('Email o contraseña incorrectos');
      setLoading(false);
    }
  }

  async function register(e){
    e.preventDefault(); setErr('');
    if(!regNombre.trim()){setErr('Ingresá tu nombre completo'); return;}
    if(regPass.length<6){setErr('Contraseña mínimo 6 caracteres'); return;}
    if(regPass!==regPass2){setErr('Las contraseñas no coinciden'); return;}
    setLoading(true);
    try{
      const cred=await auth.createUserWithEmailAndPassword(regEmail.trim(), regPass);
      await db.ref('usuarios/'+cred.user.uid).set({
        nombre:regNombre.trim(), email:regEmail.trim(),
        rol:'operario', activo:true, createdAt:Date.now()
      });
    } catch(ex){
      const msg = ex.code==='auth/email-already-in-use' ? 'Este email ya está registrado' :
                  ex.code==='auth/invalid-email' ? 'Email inválido' : 'Error al crear cuenta';
      setErr(msg); setLoading(false);
    }
  }

  function handleGoogle(){
    setErr(''); setGoogleLoading(true);
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({prompt:'select_account'});
    auth.signInWithPopup(provider).catch(e=>{
      if(e.code!=='auth/popup-closed-by-user'&&e.code!=='auth/cancelled-popup-request'){
        setErr('Error al iniciar sesión con Google. Intentá nuevamente.');
      }
      setGoogleLoading(false);
    });
  }

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100%',padding:24,background:'#fff'}}>
      <MundoLogo size={80}/>
      <h1 style={{fontSize:22,fontWeight:800,marginTop:16,color:'var(--gray-900)'}}>Mundo M</h1>
      <p style={{fontSize:14,color:'var(--gray-500)',marginBottom:24}}>Operaciones</p>

      <div style={{width:'100%',maxWidth:360}}>

        <GoogleSignInBtn onClick={handleGoogle} loading={googleLoading}/>

        <div style={{display:'flex',alignItems:'center',gap:10,margin:'18px 0'}}>
          <div style={{flex:1,height:1,background:'var(--gray-200)'}}/>
          <span style={{fontSize:12,color:'var(--gray-400)',whiteSpace:'nowrap'}}>o continuá con email</span>
          <div style={{flex:1,height:1,background:'var(--gray-200)'}}/>
        </div>

        <div className="tab-bar" style={{marginBottom:18}}>
          <button className={`tab-btn${tab==='login'?' active':''}`} onClick={()=>{setTab('login');setErr('');}}>Ingresar</button>
          <button className={`tab-btn${tab==='register'?' active':''}`} onClick={()=>{setTab('register');setErr('');}}>Crear cuenta</button>
        </div>

        {err && <div style={{background:'var(--red-l)',color:'var(--red)',padding:'10px 12px',borderRadius:8,fontSize:13,fontWeight:600,marginBottom:12}}>{err}</div>}

        {tab==='login' && (
          <form onSubmit={login}>
            <Field label="Email" required>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@email.com" required/>
            </Field>
            <Field label="Contraseña" required>
              <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" required/>
            </Field>
            <button type="submit" className="btn btn-primary btn-full" disabled={loading} style={{fontSize:15,padding:13}}>
              {loading ? 'Ingresando...' : 'Ingresar'}
            </button>
          </form>
        )}

        {tab==='register' && (
          <form onSubmit={register}>
            <div className="alert alert-info" style={{marginBottom:14,fontSize:13}}>
              Tu cuenta quedará como <strong>Operario</strong>. El admin puede cambiar el rol.
            </div>
            <Field label="Nombre completo" required>
              <input value={regNombre} onChange={e=>setRegNombre(e.target.value)} placeholder="Juan Pérez" required/>
            </Field>
            <Field label="Email" required>
              <input type="email" value={regEmail} onChange={e=>setRegEmail(e.target.value)} placeholder="tu@email.com" required/>
            </Field>
            <Field label="Contraseña" required hint="Mínimo 6 caracteres">
              <input type="password" value={regPass} onChange={e=>setRegPass(e.target.value)} placeholder="••••••••" required/>
            </Field>
            <Field label="Repetir contraseña" required>
              <input type="password" value={regPass2} onChange={e=>setRegPass2(e.target.value)} placeholder="••••••••" required/>
            </Field>
            <button type="submit" className="btn btn-primary btn-full" disabled={loading} style={{fontSize:15,padding:13}}>
              {loading ? 'Creando cuenta...' : 'Crear mi cuenta'}
            </button>

        )}

// ─── MAIN APP WRAPPER ─────────────────────────────────────────────────────────
function App(){
  const [authReady,setAuthReady]=useState(false);
  const [currentUser,setCurrentUser]=useState(null);
  const [noUsers,setNoUsers]=useState(false);

  useEffect(()=>{
    const timeout=setTimeout(()=>setAuthReady(true),8000);
    const unsub=auth.onAuthStateChanged(async fbUser=>{
      clearTimeout(timeout);
      try{
        if(fbUser){
          let snap=await db.ref('usuarios/'+fbUser.uid).once('value');
          // No profile yet? Auto-create (covers Google sign-in and any new auth method)
          if(!snap.val()){
            const nombre=fbUser.displayName||fbUser.email.split('@')[0];
            await db.ref('usuarios/'+fbUser.uid).set({
              nombre, email:fbUser.email,
              rol:'operario', activo:true,
              createdAt:Date.now()
            });
            snap=await db.ref('usuarios/'+fbUser.uid).once('value');
          }
          const profile=snap.val();
          if(profile&&profile.activo){
            setCurrentUser({uid:fbUser.uid,...profile});
            setNoUsers(false);
          } else {
            await auth.signOut();
            setCurrentUser(null);
            const allSnap=await db.ref('usuarios').once('value');
            setNoUsers(!allSnap.val());
          }
        } else {
          setCurrentUser(null);
          try{
            const allSnap=await db.ref('usuarios').once('value');
            setNoUsers(!allSnap.val());
          } catch(e){ setNoUsers(false); }
        }
      } catch(e){ console.error('Auth init error:',e); }
      setAuthReady(true);
    });
    return()=>{ clearTimeout(timeout); unsub(); };
  },[]);

  if(!authReady){
    return (
      <div className="loading-screen">
        <MundoLogo size={72}/>
        <div className="spinner"/>
        <p style={{fontSize:14,color:'var(--gray-500)'}}>Cargando Operaciones...</p>
      </div>
    );
  }
  if(!currentUser) return <LoginScreen noUsers={noUsers}/>;
  return <MainApp user={currentUser} onUserUpdate={setCurrentUser}/>;
}

// ─── CALENDAR SCREEN ──────────────────────────────────────────────────────────
function CalendarScreen({user, navigate, showToast}){
  const [jobs,setJobs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selectedDate,setSelectedDate]=useState(new Date());
  const [refDate,setRefDate]=useState(new Date()); // reference for week/month/year navigation
  const [view,setView]=useState('mes'); // 'semana' | 'mes' | 'anio'

  useEffect(()=>{
    const ref=db.ref('operaciones_jobs');
    const h=ref.on('value',snap=>{
      const data=snap.val()||{};
      const arr=Object.entries(data).map(([id,v])=>({id,...v}))
        .sort((a,b)=>(a.date||'').localeCompare(b.date||''));
      setJobs(arr);
      setLoading(false);
    });
    return()=>ref.off('value',h);
  },[]);

  const jobsByDate=useMemo(()=>{
    const m={};
    jobs.forEach(j=>{ if(j.date){ if(!m[j.date]) m[j.date]=[]; m[j.date].push(j); } });
    return m;
  },[jobs]);

  const selKey=dateKey(selectedDate);
  const dayJobs=jobsByDate[selKey]||[];
  const DAY_NAMES=['Lu','Ma','Mi','Ju','Vi','Sá','Do'];
  const MONTH_NAMES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  function getMonthDays(year, month){
    const first=new Date(year,month,1);
    const startDow=(first.getDay()+6)%7; // Monday=0
    const daysInMonth=new Date(year,month+1,0).getDate();
    const cells=[];
    for(let i=0;i<startDow;i++) cells.push(null);
    for(let d=1;d<=daysInMonth;d++) cells.push(new Date(year,month,d));
    while(cells.length%7!==0) cells.push(null);
    return cells;
  }

  // Navigation
  function prev(){
    const d=new Date(refDate);
    if(view==='semana') d.setDate(d.getDate()-7);
    else if(view==='mes') d.setMonth(d.getMonth()-1);
    else d.setFullYear(d.getFullYear()-1);
    setRefDate(d);
  }
  function next(){
    const d=new Date(refDate);
    if(view==='semana') d.setDate(d.getDate()+7);
    else if(view==='mes') d.setMonth(d.getMonth()+1);
    else d.setFullYear(d.getFullYear()+1);
    setRefDate(d);
  }
  function goToday(){ setRefDate(new Date()); setSelectedDate(new Date()); }

  // Nav label
  function navLabel(){
    if(view==='semana'){
      const wk=getWeekDays(refDate);
      return `${wk[0].toLocaleDateString('es-UY',{day:'numeric',month:'short'})} – ${wk[6].toLocaleDateString('es-UY',{day:'numeric',month:'short',year:'numeric'})}`;
    }
    if(view==='mes') return `${MONTH_NAMES[refDate.getMonth()]} ${refDate.getFullYear()}`;
    return `${refDate.getFullYear()}`;
  }

  // Status dot color
  function dotColor(jobs){
    if(!jobs||!jobs.length) return null;
    if(jobs.some(j=>j.status==='en_curso')) return 'var(--blue)';
    if(jobs.some(j=>j.status==='pendiente')) return 'var(--orange)';
    return 'var(--green)';
  }

  // ── SEMANA VIEW ──
  function WeekView(){
    const weekDays=getWeekDays(refDate);
    return (
      <div style={{display:'flex',gap:20,flex:1,minHeight:0}}>
        {/* Week strip + day jobs */}
        <div style={{flex:1,minWidth:0}}>
          <div className="cal-week" style={{marginBottom:16}}>
            {weekDays.map((d,i)=>{
              const k=dateKey(d);
              const today=dateKey(new Date())===k;
              const sel=selKey===k;
              const jj=jobsByDate[k]||[];
              return (
                <div key={i} className={`cal-day${sel?' active':''}`} onClick={()=>setSelectedDate(new Date(d))}>
                  <span className="day-name" style={today&&!sel?{color:'var(--orange)'}:{}}>{DAY_NAMES[i]}</span>
                  <span className="day-num" style={today&&!sel?{color:'var(--orange)'}:{}}>{d.getDate()}</span>
                  {jj.length>0 && <div className="day-dot" style={{background:dotColor(jj)}}/>}
                </div>
              );
            })}
          </div>
          <DayPanel/>
        </div>
        {/* Upcoming panel */}
        <UpcomingPanel/>
      </div>
    );
  }

  // ── MES VIEW ──
  function MonthView(){
    const cells=getMonthDays(refDate.getFullYear(), refDate.getMonth());
    const todayKey=dateKey(new Date());
    return (
      <div style={{display:'flex',gap:20,flex:1,minHeight:0}}>
        <div style={{flex:1,minWidth:0}}>
          {/* Day headers */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
            {DAY_NAMES.map(d=><div key={d} style={{textAlign:'center',fontSize:12,fontWeight:700,color:'var(--gray-500)',padding:'4px 0'}}>{d}</div>)}
          </div>
          {/* Cells */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
            {cells.map((d,i)=>{
              if(!d) return <div key={i}/>;
              const k=dateKey(d);
              const jj=jobsByDate[k]||[];
              const today=k===todayKey;
              const sel=k===selKey;
              return (
                <div key={i} onClick={()=>setSelectedDate(new Date(d))}
                  style={{
                    padding:'8px 4px',borderRadius:10,cursor:'pointer',minHeight:64,
                    background:sel?'var(--orange)':today?'var(--orange-l)':'var(--gray-50)',
                    border:sel?'none':today?'1.5px solid var(--orange)':'1.5px solid transparent',
                    transition:'all .15s',display:'flex',flexDirection:'column',alignItems:'center',gap:2
                  }}>
                  <span style={{fontSize:14,fontWeight:700,color:sel?'#fff':today?'var(--orange)':'var(--gray-700)'}}>{d.getDate()}</span>
                  {jj.slice(0,3).map((j,ii)=>(
                    <div key={ii} style={{
                      width:'80%',height:4,borderRadius:3,
                      background:sel?'rgba(255,255,255,.6)':STATUS_DOT_COLORS[j.status]||'var(--gray-400)'
                    }}/>
                  ))}
                  {jj.length>3 && <span style={{fontSize:9,color:sel?'rgba(255,255,255,.8)':'var(--gray-400)',fontWeight:700}}>+{jj.length-3}</span>}
                </div>
              );
            })}
          </div>
        </div>
        {/* Day panel */}
        <div className="cal-month-panel" style={{width:320,flexShrink:0}}>
          <DayPanel/>
        </div>
      </div>
    );
  }

  // ── AÑO VIEW ──
  function YearView(){
    const yr=refDate.getFullYear();
    return (
      <div className="cal-year-grid" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,flex:1}}>
        {MONTH_NAMES.map((mn,mi)=>{
          const cells=getMonthDays(yr,mi);
          const todayKey=dateKey(new Date());
          return (
            <div key={mi} className="card" style={{padding:'12px'}}>
              <div style={{fontSize:13,fontWeight:800,color:'var(--gray-800)',marginBottom:8,textAlign:'center'}}>{mn}</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:1,marginBottom:2}}>
                {DAY_NAMES.map(d=><div key={d} style={{fontSize:8,textAlign:'center',color:'var(--gray-400)',fontWeight:700}}>{d[0]}</div>)}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:1}}>
                {cells.map((d,i)=>{
                  if(!d) return <div key={i}/>;
                  const k=dateKey(d);
                  const jj=jobsByDate[k]||[];
                  const today=k===todayKey;
                  const sel=k===selKey;
                  return (
                    <div key={i} onClick={()=>{setSelectedDate(new Date(d));setRefDate(new Date(d));setView('mes');}}
                      title={jj.length?`${jj.length} trabajo(s)`:d.toLocaleDateString('es-UY')}
                      style={{
                        width:'100%',aspectRatio:'1',display:'flex',alignItems:'center',justifyContent:'center',
                        fontSize:9,fontWeight:700,borderRadius:3,cursor:jj.length||today?'pointer':'default',
                        background:sel?'var(--orange)':today?'var(--orange-l)':jj.length?'var(--blue-l)':'transparent',
                        color:sel?'#fff':today?'var(--orange)':jj.length?'var(--blue)':'var(--gray-500)',
                      }}>
                      {d.getDate()}
                    </div>
                  );
                })}
              </div>

}

// ─── JOB LIST SCREEN ──────────────────────────────────────────────────────────
function JobListScreen({user, navigate, showToast}){
  const [jobs,setJobs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filter,setFilter]=useState('todos'); // todos | pendiente | en_curso | completado
  const [search,setSearch]=useState('');

  useEffect(()=>{
    const ref=db.ref('operaciones_jobs');
    const h=ref.on('value',snap=>{
      const data=snap.val()||{};
      let arr=Object.entries(data).map(([id,v])=>({id,...v}));
      // If operario, only show jobs they're assigned to
      if(user.rol===ROLES.operario){
        arr=arr.filter(j=>Array.isArray(j.team)&&j.team.includes(user.uid));
      }
      arr.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
      setJobs(arr);
      setLoading(false);
    });
    return()=>ref.off('value',h);
  },[user.uid, user.rol]);

  const filtered=useMemo(()=>{
    let r=jobs;
    if(filter!=='todos') r=r.filter(j=>j.status===filter);
    if(search) r=r.filter(j=>(j.title+' '+(j.client||'')).toLowerCase().includes(search.toLowerCase()));
    return r;
  },[jobs,filter,search]);

  const statusFilters=[
    {id:'todos',label:'Todos'},
    {id:'pendiente',label:'Pendientes'},
    {id:'en_curso',label:'En curso'},
    {id:'completado',label:'Completados'},
  ];

  return (
    <div className="app-shell">
      <div className="top-bar">
        <MundoLogo size={32}/>
        <h1>Trabajos</h1>
      </div>
      <div className="screen">
        {/* Search */}
        <div style={{marginBottom:10,position:'relative'}}>
          <input type="search" placeholder="🔍 Buscar trabajo o cliente..." value={search} onChange={e=>setSearch(e.target.value)}
            style={{width:'100%',padding:'10px 12px',border:'1.5px solid var(--gray-300)',borderRadius:8,fontSize:14}}/>
        </div>
        {/* Filter chips */}
        <div className="chips-row">
          {statusFilters.map(f=>(
            <div key={f.id} className={`chip${filter===f.id?' active':''}`} onClick={()=>setFilter(f.id)}>{f.label}</div>
          ))}
        </div>
        {loading && <div style={{textAlign:'center',padding:40}}><div className="spinner" style={{margin:'auto'}}/></div>}
        {!loading && filtered.length===0 && (
          <div className="empty-state">
            <div className="es-icon">🔨</div>
            <p>Sin trabajos{filter!=='todos'?' en este estado':''}</p>
          </div>
        )}
        {filtered.map(j=><JobCard key={j.id} job={j} onClick={()=>navigate('jobDetail',{jobId:j.id})}/>)}
      </div>
    </div>
  );
}

// ─── JOB CARD ─────────────────────────────────────────────────────────────────
function JobCard({job, onClick}){
  return (
    <div className={`job-card status-${job.status||'pendiente'}`} onClick={onClick}>
      <div className="jc-head">
        <span style={{fontSize:22}}>{JOB_TYPE_ICONS[job.type]||'🔨'}</span>
        <div style={{flex:1}}>
          <div className="jc-title">{job.title||'Sin título'}</div>
          <div className="jc-client">{job.client||'Sin cliente'}</div>
        </div>
        <StatusBadge status={job.status||'pendiente'}/>
      </div>
      <div className="jc-meta">
        {job.date && <Badge type="badge-gray">📅 {job.date}</Badge>}
        {job.startTime && <Badge type="badge-gray">🕐 {job.startTime}</Badge>}
        {job.type && <Badge type="badge-orange">{JOB_TYPE_LABELS[job.type]||job.type}</Badge>}
        {Array.isArray(job.team) && <Badge type="badge-gray">👥 {job.team.length}</Badge>}
      </div>
      {(job.changeRequests||[]).some(cr=>cr.pendiente) && (
        <div style={{marginTop:6,padding:'4px 8px',background:'var(--yellow-l)',borderRadius:6,fontSize:12,fontWeight:700,color:'var(--yellow)',display:'inline-flex',alignItems:'center',gap:4}}>
          ⚠️ Cambio solicitado
        </div>
      )}
      {job.blueprintUrl && (
        <div style={{marginTop:4,fontSize:11,color:'var(--blue)',fontWeight:600}}>📎 Plano adjunto</div>
      )}
      {job.tasks && (()=>{
        const done=(job.tasks||[]).filter(t=>t.completed).length;
        const total=(job.tasks||[]).length;
        if(!total) return null;
        return (
          <div style={{marginTop:8}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--gray-500)',marginBottom:3}}>
              <span>Tareas</span><span>{done}/{total}</span>
            </div>
            <ProgressBar value={done} max={total}/>
          </div>
        );
      })()}
    </div>
  );
}

// ─── CHANGE REQUEST BUTTON ────────────────────────────────────────────────────
function ChangeRequestButton({jobId, user, job, showToast}){
  const [open,setOpen]=useState(false);
  const [tipo,setTipo]=useState('Cambio de diseño');
  const [descripcion,setDescripcion]=useState('');
  const [saving,setSaving]=useState(false);

  const tipos=['Cambio de diseño','Cambio de medidas','Material faltante','Problema en sitio','Solicitud del cliente','Otro'];

  async function enviar(){
    if(!descripcion.trim()){showToast('Describí el cambio solicitado','error');return;}
    setSaving(true);
    const req={tipo,descripcion:descripcion.trim(),solicitadoPor:user.nombre,uid:user.uid,ts:Date.now(),pendiente:true};
    const existing=(job.changeRequests||[]);
    await db.ref('operaciones_jobs/'+jobId+'/changeRequests').set([...existing,req]);
    showToast('Solicitud de cambio enviada al supervisor','success');
    setDescripcion(''); setOpen(false); setSaving(false);
  }

  return (
    <>
      <button className="btn btn-full" style={{marginTop:8,background:'var(--yellow-l)',color:'var(--yellow)',border:'1.5px solid var(--yellow)',fontWeight:700}}
        onClick={()=>setOpen(true)}>
        ⚠️ Solicitar cambio al supervisor
      </button>
      {open && (
        <div className="modal-overlay" onClick={()=>setOpen(false)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <h2 style={{fontSize:16,fontWeight:800,marginBottom:16}}>Solicitar cambio</h2>
            <div className="field">
              <label style={{fontSize:13,fontWeight:700,color:'var(--gray-700)',display:'block',marginBottom:5}}>Tipo de cambio</label>
              <select value={tipo} onChange={e=>setTipo(e.target.value)} style={{width:'100%',padding:'10px 12px',border:'1.5px solid var(--gray-300)',borderRadius:8,fontSize:14}}>
                {tipos.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div className="field">
              <label style={{fontSize:13,fontWeight:700,color:'var(--gray-700)',display:'block',marginBottom:5}}>Descripción del cambio</label>
              <textarea value={descripcion} onChange={e=>setDescripcion(e.target.value)}
                placeholder="Describí qué necesita cambiar y por qué..."
                style={{width:'100%',padding:'10px 12px',border:'1.5px solid var(--gray-300)',borderRadius:8,fontSize:14,minHeight:100,resize:'vertical'}}/>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-secondary btn-full" onClick={()=>setOpen(false)}>Cancelar</button>
              <button className="btn btn-primary btn-full" onClick={enviar} disabled={saving}>
                {saving?'Enviando...':'📤 Enviar'}
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ─── JOB DETAIL SCREEN ────────────────────────────────────────────────────────
